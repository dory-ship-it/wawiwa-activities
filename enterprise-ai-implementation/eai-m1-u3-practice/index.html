<script>
/*
 * Practice Studio — local deterministic feedback engine (Phase 1).
 * Pure functions, no DOM, no network. This is the always-on layer and the
 * live-AI-off fallback. It evaluates an activity's quality_checks against
 * declarative rule definitions (checks.json), produces per-field readiness
 * tags (Ready / Light / Revise), rubric verdicts, lesson routing, and the
 * overall completion level. Activity-specific knowledge lives in data files,
 * never in this code.
 */
(function (root) {
  'use strict';

  var TAGS = { READY: 'Ready', LIGHT: 'Light', REVISE: 'Revise' };
  var TAG_RANK = { Ready: 0, Light: 1, Revise: 2 };

  var PII_PATTERNS = {
    email_addresses: {
      label: 'an email address',
      re: /[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/
    },
    phone_numbers: {
      label: 'a phone number',
      re: /\+?\d(?:[\s().\-]?\d){8,}/
    },
    long_digit_sequences: {
      label: 'a long ID-like number',
      re: /\d{9,}/
    },
    api_key_shaped_tokens: {
      label: 'a key or token',
      re: /\b(?=[A-Za-z0-9_\-]{20,}(\b|$))(?=[^\s]*\d)(?=[^\s]*[A-Za-z])[A-Za-z0-9_\-]{20,}\b/
    }
  };

  var DEFAULT_STRINGS = {
    empty_field: 'This field is still empty. Fill it in; the canvas needs all of its fields.',
    empty_point: 'This point has no answer yet.',
    unknown_check_fail: 'Give this field more substance: a couple of concrete sentences, not a fragment.',
    pii_warning: 'Careful: this looks like {what}. Do not enter real identifying data; generalize instead (CRM system, internal policy, employee).',
    ready_note: 'Solid on the local checks.',
    routing_line: 'This field rests on {lessons}. Revisit before you revise.',
    routing_line_decision: 'This choice leans on {lessons}. Revisit it before Module 2.',
    rubric_ready: 'Meets the bar on the local checks.',
    rubric_light: 'Close. A light touch is needed on: {fields}.',
    rubric_revise: 'Needs real work on: {fields}.',
    rubric_complete: 'All {n} fields are filled.',
    rubric_incomplete: '{n} field(s) are still empty: {fields}.',
    rubric_live_only: 'Judged by the coach, not by the local checks.',
    pitch_incomplete_note: 'The pitch plan still has {n} unanswered point(s).',
    fix_prefix: 'Highest-value fix'
  };

  /* ---------- helpers ---------- */

  function words(text) {
    var t = (text || '').trim();
    return t ? t.split(/\s+/) : [];
  }

  function fmt(template, vars) {
    return template.replace(/\{(\w+)\}/g, function (m, k) {
      return vars[k] !== undefined ? vars[k] : m;
    });
  }

  function containsAny(text, terms) {
    var low = text.toLowerCase();
    for (var i = 0; i < terms.length; i++) {
      if (low.indexOf(String(terms[i]).toLowerCase()) !== -1) return true;
    }
    return false;
  }

  /* ---------- PII detection (local warning + Phase 2 pre-redaction list) ---------- */

  function detectPII(text, enabledPatterns) {
    var found = [];
    var keys = enabledPatterns && enabledPatterns.length
      ? enabledPatterns
      : Object.keys(PII_PATTERNS);
    for (var i = 0; i < keys.length; i++) {
      var p = PII_PATTERNS[keys[i]];
      if (p && p.re.test(text || '')) found.push({ type: keys[i], label: p.label });
    }
    return found;
  }

  /* ---------- declarative rule evaluator ---------- */

  function evalRule(rule, text) {
    if (!rule || typeof rule !== 'object') return true;
    if (rule.all) {
      return rule.all.every(function (r) { return evalRule(r, text); });
    }
    if (rule.any) {
      return rule.any.some(function (r) { return evalRule(r, text); });
    }
    if (rule.not) {
      return !evalRule(rule.not, text);
    }
    if (rule.min_words !== undefined) {
      return words(text).length >= rule.min_words;
    }
    if (rule.max_words !== undefined) {
      return words(text).length <= rule.max_words;
    }
    if (rule.contains_any) {
      return containsAny(text, rule.contains_any);
    }
    if (rule.contains_all_groups) {
      return rule.contains_all_groups.every(function (group) {
        return containsAny(text, group);
      });
    }
    if (rule.has_number !== undefined) {
      return /\d/.test(text) === !!rule.has_number;
    }
    if (rule.count_min) {
      var re = new RegExp(rule.count_min.regex, 'g');
      var m = (text || '').match(re);
      return (m ? m.length : 0) >= rule.count_min.min;
    }
    if (rule.each_line_contains_any) {
      var cfg = rule.each_line_contains_any;
      var minW = cfg.min_line_words || 1;
      var lines = (text || '').split(/\n+/).filter(function (l) {
        return words(l).length >= minW;
      });
      if (!lines.length) return containsAny(text || '', cfg.terms);
      return lines.every(function (l) { return containsAny(l, cfg.terms); });
    }
    if (rule.no_pii !== undefined) {
      return (detectPII(text).length === 0) === !!rule.no_pii;
    }
    if (rule.regex) {
      return new RegExp(rule.regex, 'i').test(text || '');
    }
    return true; // unknown rule kinds never block the student
  }

  /* ---------- routing ---------- */

  function lessonLabel(key, lessonMap) {
    var name = (lessonMap || {})[key] || key;
    var num = (key.match(/\d+/) || [null])[0];
    return num ? 'Lesson ' + num + ' (' + name + ')' : name;
  }

  // A routes_to key may point at a section (finer) or a lesson. Section
  // names resolve as-is; lesson keys keep the "Lesson N (name)" form.
  function routeLabel(key, activity) {
    var sections = activity.section_map || {};
    if (sections[key]) return sections[key];
    return lessonLabel(key, activity.lesson_map);
  }

  function routingLine(field, activity, strings) {
    var routes = field.routes_to || [];
    if (!routes.length) return null;
    var labels = routes.map(function (k) {
      return routeLabel(k, activity);
    });
    return fmt(strings.routing_line, { lessons: labels.join(' and ') });
  }

  // per-topic reading, surfaced only when the answer is not yet Ready
  function weakResources(item) {
    return (item.resources || []).filter(function (r) {
      return r && r.title && /^https:\/\//i.test(r.url || '');
    });
  }

  /* ---------- field evaluation ---------- */

  function evaluateField(field, text, checksFile, activity) {
    var strings = getStrings(checksFile);
    var trimmed = (text || '').trim();
    var result = {
      fieldId: field.id,
      tag: TAGS.READY,
      empty: false,
      messages: [],
      piiWarnings: [],
      routing: null
    };

    var safety = (activity && activity.safety) || {};
    var pii = detectPII(trimmed, safety.redact_before_ai);
    pii.forEach(function (p) {
      result.piiWarnings.push(fmt(strings.pii_warning, { what: p.label }));
    });

    if (!trimmed) {
      result.empty = true;
      result.tag = TAGS.REVISE;
      result.messages.push(strings.empty_field);
      result.routing = null; // routing only helps once there is something to revise
      return result;
    }

    var defs = (checksFile && checksFile.definitions) || {};
    var checkIds = field.quality_checks || [];
    var failures = 0;
    checkIds.forEach(function (id) {
      var def = defs[id];
      var passed;
      if (def && def.pass) {
        passed = evalRule(def.pass, trimmed);
        if (!passed) result.messages.push(def.fail_message || strings.unknown_check_fail);
      } else {
        passed = evalRule({ min_words: 8 }, trimmed); // generic substance fallback
        if (!passed) result.messages.push(strings.unknown_check_fail);
      }
      if (!passed) failures++;
    });

    var total = checkIds.length || 1;
    if (failures === 0) {
      result.tag = TAGS.READY;
    } else if (failures / total <= 0.5) {
      result.tag = TAGS.LIGHT;
    } else {
      result.tag = TAGS.REVISE;
    }

    // PII anywhere blocks a clean Ready: the exercise forbids identifying data.
    if (result.tag === TAGS.READY && result.piiWarnings.length) {
      result.tag = TAGS.LIGHT;
    }

    if (result.tag !== TAGS.READY) {
      result.routing = routingLine(field, activity, strings);
      result.resources = weakResources(field);
    }
    if (result.tag === TAGS.READY && !result.messages.length) {
      result.messages.push(strings.ready_note);
    }
    return result;
  }

  /* ---------- ordered points (pitch planner) evaluation ---------- */

  function evaluatePoint(prompt, text, checksFile) {
    var strings = getStrings(checksFile);
    var cfg = (checksFile && checksFile.ordered_points) || {};
    var minW = cfg.min_words || 3;
    var maxW = cfg.max_words || 120;
    var trimmed = (text || '').trim();
    var result = { promptId: prompt.id, tag: TAGS.READY, empty: false, messages: [] };

    if (!trimmed) {
      result.empty = true;
      result.tag = TAGS.REVISE;
      result.messages.push(strings.empty_point);
      return result;
    }
    var n = words(trimmed).length;
    if (n < minW) {
      result.tag = TAGS.LIGHT;
      result.messages.push(cfg.too_short_message || strings.unknown_check_fail);
    } else if (n > maxW) {
      result.tag = TAGS.LIGHT;
      result.messages.push(cfg.too_long_message || strings.unknown_check_fail);
    } else {
      result.messages.push(strings.ready_note);
    }
    return result;
  }

  /* ---------- rubric + overall ---------- */

  function getStrings(checksFile) {
    var out = {};
    var override = (checksFile && checksFile.strings) || {};
    Object.keys(DEFAULT_STRINGS).forEach(function (k) {
      out[k] = override[k] || DEFAULT_STRINGS[k];
    });
    return out;
  }

  function collectFields(activity) {
    var fields = [];
    (activity.sections || []).forEach(function (s) {
      if (s.type === 'fields') fields = fields.concat(s.fields || []);
      if (s.type === 'scenes') {
        (s.scenes || []).forEach(function (scene) {
          if (scene.reflection) fields.push(scene.reflection);
        });
      }
    });
    return fields;
  }

  function collectScenes(activity) {
    var scenes = [];
    (activity.sections || []).forEach(function (s) {
      if (s.type === 'scenes') scenes = scenes.concat(s.scenes || []);
    });
    return scenes;
  }

  /* ---------- branching decisions (scenes sections) ---------- */

  var QUALITY_TAG = { strong: TAGS.READY, mixed: TAGS.LIGHT, weak: TAGS.REVISE };

  function decisionKey(scene) {
    return 'decision:' + scene.id;
  }

  // A decision is judged by its authored quality; a weak-on-dependency choice
  // surfaces the same "revisit Lesson N" routing as a weak field.
  function evaluateDecision(scene, optionId, activity, checksFile) {
    var strings = getStrings(checksFile);
    var result = { sceneId: scene.id, tag: null, empty: true, option: null, routing: null };
    var option = (scene.decision.options || []).filter(function (o) {
      return o.id === optionId;
    })[0];
    if (!option) return result;
    result.empty = false;
    result.option = option;
    result.tag = QUALITY_TAG[option.quality] || TAGS.LIGHT;
    if (result.tag !== TAGS.READY) {
      if ((option.routes_to || []).length) {
        var labels = (option.routes_to || []).map(function (k) {
          return routeLabel(k, activity);
        });
        result.routing = fmt(strings.routing_line_decision, { lessons: labels.join(' and ') });
      }
      result.resources = weakResources(scene);
    }
    return result;
  }

  function collectPrompts(activity) {
    var prompts = [];
    (activity.sections || []).forEach(function (s) {
      if (s.type === 'ordered_points') prompts = prompts.concat(s.prompts || []);
    });
    return prompts;
  }

  function evaluateActivity(activity, checksFile, answers) {
    var strings = getStrings(checksFile);
    answers = answers || {};
    var fields = collectFields(activity);
    var prompts = collectPrompts(activity);

    var fieldResults = {};
    fields.forEach(function (f) {
      fieldResults[f.id] = evaluateField(f, answers[f.id], checksFile, activity);
    });

    // branching decisions (scenes sections); answers hold the chosen option
    // id under "decision:<sceneId>". Unreached scenes are not penalized: on a
    // branch, the student legitimately never sees some scenes. Only scenes on
    // the traveled path (a recorded answer) or with no answer AND marked
    // visited by the caller count. We treat "answered" as the signal.
    var scenes = collectScenes(activity);
    var decisionResults = {};
    scenes.forEach(function (scene) {
      decisionResults[scene.id] =
        evaluateDecision(scene, answers[decisionKey(scene)], activity, checksFile);
    });

    var pointResults = {};
    prompts.forEach(function (p) {
      pointResults[p.id] = evaluatePoint(p, answers[p.id], checksFile);
    });

    // pitch total-length note
    var notes = [];
    var cfg = (checksFile && checksFile.ordered_points) || {};
    var totalPitch = prompts.reduce(function (sum, p) {
      return sum + words(answers[p.id]).length;
    }, 0);
    if (cfg.total_max_words && totalPitch > cfg.total_max_words) {
      notes.push(cfg.total_too_long_message || strings.unknown_check_fail);
    }

    // rubric verdicts
    var rubricAuto = (checksFile && checksFile.rubric_auto) || {};
    var rubric = (activity.rubric || []).map(function (crit) {
      // the pitch's own mastery signal: seven points in order, each within
      // its word bounds, the whole thing tight enough for three minutes.
      // Ready only on the pitch's OWN pass; a finished canvas alone earns
      // nothing here.
      if (rubricAuto[crit.id] === 'pitch_ready') {
        if (!prompts.length) {
          return { id: crit.id, name: crit.name, tag: null, verdict: strings.rubric_live_only };
        }
        var emptyPts = prompts.filter(function (p) { return pointResults[p.id].empty; });
        if (emptyPts.length) {
          return {
            id: crit.id, name: crit.name, tag: TAGS.REVISE,
            verdict: fmt(strings.pitch_incomplete_note, { n: emptyPts.length })
          };
        }
        var weakPts = prompts.filter(function (p) { return pointResults[p.id].tag !== TAGS.READY; });
        var overTotal = cfg.total_max_words && totalPitch > cfg.total_max_words;
        if (weakPts.length || overTotal) {
          var labels = weakPts.map(function (p) { return p.label; });
          if (overTotal) labels.push('the total length');
          return {
            id: crit.id, name: crit.name, tag: TAGS.LIGHT,
            verdict: fmt(strings.rubric_light, { fields: labels.join('; ') })
          };
        }
        return { id: crit.id, name: crit.name, tag: TAGS.READY, verdict: strings.rubric_ready };
      }
      if (rubricAuto[crit.id] === 'all_fields_filled') {
        var emptyF = fields.filter(function (f) {

<script>
/*
 * Practice Studio — client-side PII redactor (Phase 2).
 * Runs over the student's text BEFORE anything is substituted into a coach
 * prompt and sent to the proxy. Unredacted text never leaves the browser.
 * The Worker applies the same patterns again server-side as a second layer.
 * Pure, DOM-free, mirrors the pattern list in the activity spec's
 * safety.redact_before_ai and in proxy/worker.js.
 */
(function (root) {
  'use strict';

  var PATTERNS = [
    { name: 'email_addresses', re: /[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/g, sub: '[email removed]' },
    { name: 'phone_numbers', re: /\+?\d(?:[\s().\-]?\d){8,}/g, sub: '[number removed]' },
    { name: 'long_digit_sequences', re: /\d{9,}/g, sub: '[number removed]' },
    {
      name: 'api_key_shaped_tokens',
      re: /\b(?=[A-Za-z0-9_\-]{20,}(\b|$))(?=[^\s]*\d)(?=[^\s]*[A-Za-z])[A-Za-z0-9_\-]{20,}\b/g,
      sub: '[token removed]'
    }
  ];

  function redact(text) {
    var out = String(text || '');
    PATTERNS.forEach(function (p) {
      p.re.lastIndex = 0;
      out = out.replace(p.re, p.sub);
    });
    return out;
  }

  root.PracticeRedact = { redact: redact, PATTERNS: PATTERNS };
})(typeof window !== 'undefined' ? window : this);

<script>
/*
 * Practice Studio — live coach client (Phase 2).
 *
 * Talks to the Wawiwa anonymizing proxy when the center has the live layer
 * on. This file is only bundled into a page when the build config enables
 * live AI; the default (off) build contains no network code at all.
 *
 * What it sends per call: the coach system prompt, the activity's grounding
 * pack, and one call prompt with the student's REDACTED text substituted in.
 * No identifier of any kind. What it never does: block the student. Every
 * failure path rejects quickly so the engine can fall back to the local
 * deterministic feedback.
 *
 * Prompt templates come from the activity's coach_prompts.md (bundled at
 * build time into window.LIVE.prompts). The placeholder vocabulary this
 * client substitutes is part of the generator contract:
 *   {field.label} {field.help} {field.quality_checks}
 *   {resolved names of field.rubric_refs}

 *   {short_canvas_summary}

  var TAG_RE = /\b(Ready|Light|Revise)\b[.!\s"']*$/;
  var CALL_TIMEOUT_MS = 20000;

  var usedTokens = 0;

  function cfg() {
    return root.LIVE || null;
  }

  function available() {
    var c = cfg();
    return !!(c && c.enabled && c.proxy_url);
  }

  function capReached() {
    var c = cfg();
    if (!c) return true;
    return usedTokens >= (c.session_token_cap || 25000);
  }

  function usage() {
    var c = cfg() || {};
    return { used: usedTokens, cap: c.session_token_cap || 25000 };
  }

  /* ---------- prompt assembly ---------- */

  function fill(template, values) {
    var out = template || '';
    Object.keys(values).forEach(function (key) {
      out = out.split('{' + key + '}').join(values[key]);
    });
    return out;
  }

  function lessonNames(field, activity) {
    var routes = field.routes_to || [];
    if (!routes.length) return 'none';
    // section keys resolve to the specific section name, one voice with the
    // local engine's routing
    return routes.map(function (k) {
      return root.PracticeFeedback.routeLabel(k, activity);
    }).join('; ');
  }

  // per-topic resources ride along so the coach can point at them by name
  function resourceNote(item) {
    var reads = (item.resources || []).filter(function (r) {
      return r && r.title && /^https:\/\//i.test(r.url || '');
    });
    if (!reads.length) return '';
    return '\n\nRecommended resource for this field (mention it briefly if the answer is weak): '
      + reads.map(function (r) { return '"' + r.title + '" (' + r['for'] + ')'; }).join('; ');
  }

  function rubricNames(field, activity) {
    var refs = field.rubric_refs || [];
    var byId = {};
    (activity.rubric || []).forEach(function (r) { byId[r.id] = r.name; });
    return refs.map(function (id) { return byId[id] || id; }).join('; ') || 'none';
  }

  function redacted(text) {
    return root.PracticeRedact.redact(text || '');
  }

  function buildFieldCall(field, activity, studentText) {
    return fill(cfg().prompts.field, {
      'field.label': field.label,
      'field.help': field.help || '',
      'field.quality_checks': (field.quality_checks || []).join(', ') || 'none',
      'resolved names of field.rubric_refs': rubricNames(field, activity),
      'field.routes_to as lesson names, or "none"': lessonNames(field, activity),
      'student_text': redacted(studentText)
    }) + resourceNote(field);
  }

  function concatFields(activity, answers) {
    var FB = root.PracticeFeedback;
    return FB.collectFields(activity).map(function (f) {
      var n = f.number !== undefined ? f.number + '. ' : '';
      return n + f.label + ':\n' + redacted(answers[f.id] || '(empty)');
    }).join('\n\n');
  }

  function shortCanvasSummary(activity, answers) {
    var FB = root.PracticeFeedback;
    return FB.collectFields(activity).map(function (f) {
      var words = redacted(answers[f.id] || '').split(/\s+/).slice(0, 20).join(' ');
      return f.label + ': ' + (words || '(empty)');
    }).join('\n');
  }

  function concatPitch(activity, answers) {
    var FB = root.PracticeFeedback;
    return FB.collectPrompts(activity).map(function (p, i) {
      return (i + 1) + '. ' + p.label + '\n' + redacted(answers[p.id] || '(empty)');
    }).join('\n\n');
  }

  function buildCanvasCall(activity, answers) {
    return fill(cfg().prompts.canvas, {
      'all_fields_concatenated': concatFields(activity, answers)
    });
  }

  function buildPitchCall(activity, answers) {
    return fill(cfg().prompts.pitch, {
      'pitch_text': concatPitch(activity, answers),
      'short_canvas_summary': shortCanvasSummary(activity, answers)
    });
  }

  /* ---------- proxy transport ---------- */

  function callProxy(kind, call) {
    var c = cfg();
    if (!available()) return Promise.reject(new Error('live_off'));
    if (capReached()) return Promise.reject(new Error('token_cap'));

    var controller = typeof AbortController !== 'undefined' ? new AbortController() : null;
    var timer = controller && setTimeout(function () { controller.abort(); }, CALL_TIMEOUT_MS);

    var payload = {
      kind: kind,
      system: c.prompts.system,
      grounding: c.grounding,
      call: call,
      session: { used_tokens: usedTokens }
    };
    // per-center model choice; the Worker honors it only when the model is
    // in its server-side allowlist (ALLOWED_MODELS)
    if (c.model) payload.model = c.model;

    return fetch(c.proxy_url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: controller ? controller.signal : undefined,
      body: JSON.stringify(payload)
    }).then(function (resp) {
      if (timer) clearTimeout(timer);
      return resp.json().then(function (data) {
        if (!resp.ok || !data.ok) {
          throw new Error(data && data.error === 'token_cap' ? 'token_cap' : 'proxy_error');
        }
        var u = data.usage || {};
        usedTokens += (u.input_tokens || 0) + (u.output_tokens || 0);
        return data.text || '';
      });
    }).catch(function (err) {
      if (timer) clearTimeout(timer);
      throw err;
    });
  }

  function parseTag(text) {
    var m = TAG_RE.exec((text || '').trim());
    return m ? m[1] : null;
  }

  /* ---------- public API (what engine.js uses) ---------- */

  var api = {
    available: available,
    capReached: capReached,
    usage: usage,
    coachField: function (field, activity, studentText) {
      return callProxy('field', buildFieldCall(field, activity, studentText)).then(function (text) {
        return { text: text, tag: parseTag(text) };
      });
    },
    coachCanvas: function (activity, answers) {
      return callProxy('canvas', buildCanvasCall(activity, answers)).then(function (text) {
        return { text: text, tag: null };
      });
    },
    coachPitch: function (activity, answers) {
      return callProxy('pitch', buildPitchCall(activity, answers)).then(function (text) {
        return { text: text, tag: parseTag(text) };
      });
    },
    // exposed for tests
    _buildFieldCall: buildFieldCall,
    _buildCanvasCall: buildCanvasCall,
    _buildPitchCall: buildPitchCall,
    _parseTag: parseTag
  };

  root.PracticeLive = api;
})(typeof window !== 'undefined' ? window : this);

</script>
<script>
/*
 * Practice Studio — shared runtime core (Phase 3).
 *
 * Everything every format needs: DOM helpers, the Wawiwa brand pieces
 * (inline SVG logo, medallions, badges, spinner), local + live feedback
 * blocks with the shared Ready/Light/Revise tags, autosave, the page chrome
 * (header, safety notice, footer, export), and the FORMAT REGISTRY.
 *
 * A format is one function registered under a name; meta.format picks it.
 * Adding a format later = one new file calling PracticeCore.registerFormat,
 * concatenated by build.py. No rebuild of anything here.
 *
 * No network code lives in this file. The live coach (window.PracticeLive)
 * exists only in live builds; everything here guards on liveOn().
 */
(function () {
  'use strict';

  var FB = window.PracticeFeedback;
  var TAG_CLASS = { Ready: 'tag-ready', Light: 'tag-light', Revise: 'tag-revise' };

  function liveOn() {
    return !!(window.PracticeLive && window.PracticeLive.available());
  }

  /* ---------- DOM helpers (textContent only, never user HTML) ---------- */

  function el(tagName, className, text) {
    var node = document.createElement(tagName);
    if (className) node.className = className;
    if (text !== undefined && text !== null) node.textContent = text;
    return node;
  }

  function svgEl(markup, className) {
    var wrap = el('span', className);
    wrap.innerHTML = markup; // static, engine-authored markup only
    return wrap;
  }

  // Visual slots (cover_image, intro.illustration, scene.image). The build
  // bakes each referenced image into window.ASSETS as a data: URI; paths
  // resolve against that map, so nothing is ever fetched. External URLs are
  // refused so the no-external-request guarantee holds at runtime too.
  function imageEl(src, className, alt) {
    if (!src) return null;
    if (/^(https?:)?\/\//i.test(src)) return null; // external: refused
    var resolved = src;
    if (!/^data:/i.test(src)) {
      resolved = (window.ASSETS || {})[src] || null;
      if (!resolved) return null; // not baked in: render nothing, never fetch
    }
    var img = el('img', className);
    img.src = resolved;
    img.alt = alt || '';
    return img;
  }

  /* ---------- brand SVG library ---------- */

  var SVG = {
    // the red-tag wawiwa logo
    logo: '<svg viewBox="0 0 120 48" width="100" height="40" role="img" aria-label="wawiwa">'
      + '<rect x="0" y="0" width="120" height="34" rx="2" fill="#EE3124"/>'
      + '<path d="M26 33 L46 33 L26 47 Z" fill="#EE3124"/>'
      + '<text x="60" y="25" text-anchor="middle" font-family="Roboto, sans-serif" font-weight="800" font-size="23" fill="#fff" letter-spacing="0">wawiwa</text></svg>',
    // circular ring medallion with a check that appears when done
    ring: function (label) {
      return '<svg viewBox="0 0 36 36" width="34" height="34" class="ring-svg">'
        + '<circle class="ring-track" cx="18" cy="18" r="15.5" fill="none" stroke-width="2.5"/>'
        + '<circle class="ring-fill" cx="18" cy="18" r="15.5" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="97.4" transform="rotate(-90 18 18)"/>'
        + '<text class="ring-label" x="18" y="23" text-anchor="middle" font-family="Roboto, sans-serif" font-weight="700" font-size="13.5">' + label + '</text>'
        + '<path class="ring-check" d="M11.5 18.5l4.5 4.5 8.5-9" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    },
    spinner: '<svg viewBox="0 0 24 24" width="18" height="18" class="spin-svg">'
      + '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="42" stroke-dashoffset="28"/></svg>',
    spark: '<svg viewBox="0 0 20 20" width="14" height="14"><path d="M10 1.5l1.9 6.1 6.1 1.9-6.1 1.9L10 17.5 8.1 11.4 2 9.5l6.1-1.9z" fill="currentColor"/></svg>',
    download: '<svg viewBox="0 0 20 20" width="15" height="15"><path d="M10 2.5v9m0 0l-3.5-3.5M10 11.5l3.5-3.5M3.5 15h13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    shield: '<svg viewBox="0 0 22 22" width="18" height="18"><path d="M11 1.8l7.5 2.8v5.6c0 4.6-3.1 8.1-7.5 9.9-4.4-1.8-7.5-5.3-7.5-9.9V4.6L11 1.8z" fill="none" stroke="#EE3124" stroke-width="1.8" stroke-linejoin="round"/><path d="M7.6 11l2.3 2.3 4.4-4.6" fill="none" stroke="#EE3124" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    // level badges for the review banner
    badgeReady: '<svg viewBox="0 0 48 48" width="44" height="44"><circle cx="24" cy="24" r="21" fill="rgba(255,255,255,0.22)"/><path d="M14 24.5l6.5 6.5L34 17.5" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    badgeLight: '<svg viewBox="0 0 48 48" width="44" height="44"><circle cx="24" cy="24" r="21" fill="rgba(255,255,255,0.22)"/><path d="M24 13v13" stroke="#fff" stroke-width="4" stroke-linecap="round"/><circle cx="24" cy="33.5" r="2.6" fill="#fff"/></svg>',
    badgeRevise: '<svg viewBox="0 0 48 48" width="44" height="44"><circle cx="24" cy="24" r="21" fill="rgba(255,255,255,0.22)"/><path d="M17 17l14 14M31 17l-14 14" stroke="#fff" stroke-width="4" stroke-linecap="round"/></svg>',
    chevron: '<svg viewBox="0 0 20 20" width="14" height="14"><path d="M7 4l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
    restart: '<svg viewBox="0 0 20 20" width="14" height="14"><path d="M4 10a6 6 0 116 6M4 10V5.5M4 10h4.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
  };

  var LEVEL_BADGES = [SVG.badgeReady, SVG.badgeLight, SVG.badgeRevise];

  /* ---------- local storage (student's own work, device only) ---------- */

  function storageKey(activity) {
    return 'practice-studio:' + activity.meta.id;
  }

  function loadAnswers(activity) {
    try {
      var raw = localStorage.getItem(storageKey(activity));
      return raw ? JSON.parse(raw) : {};
    } catch (e) { return {}; }
  }

  function saveAnswers(activity, answers) {
    try {
      localStorage.setItem(storageKey(activity), JSON.stringify(answers));
    } catch (e) { /* storage blocked: page still works, nothing leaves the device */ }
  }

  function clearAnswers(activity) {
    try { localStorage.removeItem(storageKey(activity)); } catch (e) { /* ignore */ }
  }

  /* ---------- tags + feedback blocks (one voice for local and live) ---------- */

  function tagPill(tag) {
    return el('span', 'tag-pill ' + (TAG_CLASS[tag] || 'tag-none'), tag);
  }

  function feedbackBlock(container, result) {
    container.textContent = '';
    container.classList.add('has-feedback', 'local-box');
    container.classList.remove('coach-box');
    var head = el('div', 'feedback-head');
    head.appendChild(el('span', 'feedback-title', 'Local check'));
    head.appendChild(tagPill(result.tag));
    container.appendChild(head);
    (result.piiWarnings || []).forEach(function (w) {
      container.appendChild(el('div', 'feedback-line pii-line', w));
    });
    (result.messages || []).forEach(function (m) {
      var cls = result.tag === 'Ready' ? 'feedback-line ok-line' : 'feedback-line';
      container.appendChild(el('div', cls, m));
    });
    if (result.routing) {
      container.appendChild(el('div', 'feedback-line routing-line', result.routing));
    }
    appendResources(container, result.resources);
  }

  // per-topic "read this" links: ordinary navigation anchors in a new tab;
  // nothing is fetched by the page, the offline guarantee is untouched
  function appendResources(container, resources) {
    (resources || []).forEach(function (res) {
      var row = el('div', 'resource-row');
      var link = el('a', 'resource-link', res.title);
      link.href = res.url;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      row.appendChild(link);
      row.appendChild(el('span', 'resource-for', res['for']));
      container.appendChild(row);
    });
  }

  function coachBlock(container, text, tag) {
    container.textContent = '';
    container.classList.add('has-feedback', 'coach-box');
    container.classList.remove('local-box');
    var head = el('div', 'feedback-head');
    head.appendChild(el('span', 'feedback-title coach-title', 'Live coach'));
    if (tag) head.appendChild(tagPill(tag));
    container.appendChild(head);
    if (text) container.appendChild(el('div', 'feedback-line', text));
  }

  function coachThinking(container) {
    container.textContent = '';
    container.classList.add('has-feedback', 'coach-box');
    var row = el('div', 'coach-thinking');
    row.appendChild(svgEl(SVG.spinner, 'spin'));
    row.appendChild(el('span', 'coach-note', 'The coach is reading your work...'));
    container.appendChild(row);
  }

  function coachFallback(state, container, err, localFn) {
    var capped = err && err.message === 'token_cap';
    if (capped) {
      state.coachButtons.forEach(function (b) { b.disabled = true; });
    }
    container.textContent = '';
    container.classList.remove('has-feedback', 'coach-box', 'local-box');
    if (localFn) localFn();
    container.appendChild(el('div', 'feedback-line coach-note coach-offline',
      capped
        ? 'The live coach reached this session’s limit. The local checks keep working.'
        : 'The live coach is unavailable right now. Here is the local check instead.'));
  }

  function coachButton(state, label, onClick) {
    var btn = el('button', 'btn btn-coach');
    btn.type = 'button';
    btn.appendChild(svgEl(SVG.spark, 'btn-icon'));
    btn.appendChild(el('span', null, label));
    btn.addEventListener('click', function () {
      if (window.PracticeLive.capReached()) {
        state.coachButtons.forEach(function (b) { b.disabled = true; });
        return;
      }
      onClick(btn);
    });
    state.coachButtons.push(btn);
    return btn;
  }

  /* ---------- shared field editor (canvas fields and scene reflections) ---------- */

  function fieldEditor(state, activity, field, opts) {
    opts = opts || {};
    var card = el('div', 'field-card' + (opts.embedded ? ' field-embedded' : ''));
    card.id = 'card-' + field.id;

    var head = el('div', 'field-head');
    var medal = svgEl(SVG.ring(opts.badge !== undefined ? opts.badge : (field.number !== undefined ? String(field.number) : '•')), 'field-medal');
    head.appendChild(medal);
    var labelWrap = el('div', 'field-label-wrap');
    labelWrap.appendChild(el('h3', 'field-label', field.label));
    if (field.help) labelWrap.appendChild(el('p', 'field-help', field.help));
    head.appendChild(labelWrap);
    card.appendChild(head);

    if (field.good_example || field.weak_example) {
      var ex = el('div', 'examples');
      [['weak_example', 'Weak', 'example-weak'], ['good_example', 'Strong', 'example-good']].forEach(function (spec) {
        if (!field[spec[0]]) return;
        var row = el('div', 'example ' + spec[2]);
        row.appendChild(el('span', 'example-tag', spec[1]));
        row.appendChild(el('span', 'example-text', field[spec[0]]));
        ex.appendChild(row);
      });
      card.appendChild(ex);
    }

    var ta = el('textarea', 'answer-input');
    ta.placeholder = opts.placeholder || 'Write here. No names, IDs, or confidential text.';
    ta.value = state.answers[field.id] || '';
    ta.addEventListener('input', function () {
      state.answers[field.id] = ta.value;
      saveAnswers(state.activity, state.answers);
    });
    card.appendChild(ta);

    var feedback = el('div', 'feedback');
    var check = function () {
      var result = FB.evaluateField(field, state.answers[field.id], state.checks, activity);
      feedbackBlock(feedback, result);
      card.classList.toggle('card-ready', result.tag === 'Ready');
      if (opts.onResult) opts.onResult(result);
      return result;
    };
    ta.addEventListener('blur', function () {
      if ((ta.value || '').trim()) check();
    });

    var btnRow = el('div', 'btn-row');
    var btn = el('button', 'btn btn-primary', opts.checkLabel || 'Check this field');
    btn.type = 'button';
    btn.addEventListener('click', check);
    btnRow.appendChild(btn);

    var coachOut = null;
    if (liveOn()) {
      coachOut = el('div', 'feedback');
      btnRow.appendChild(coachButton(state, 'Ask the coach', function (b) {
        if (!(state.answers[field.id] || '').trim()) { check(); return; }
        b.disabled = true;
        coachThinking(coachOut);
        window.PracticeLive.coachField(field, activity, state.answers[field.id])
          .then(function (r) {
            b.disabled = false;
            coachBlock(coachOut, r.text, r.tag);
            // one voice: a weak verdict surfaces the same "read this" links
            if (r.tag && r.tag !== 'Ready') {
              appendResources(coachOut, (field.resources || []).filter(function (res) {
                return res && res.title && /^https:\/\//i.test(res.url || '');
              }));
            }
            if (r.tag && opts.onResult) opts.onResult({ tag: r.tag, empty: false });
          })
          .catch(function (err) {
            b.disabled = false;
            coachFallback(state, coachOut, err, check);
          });
      }));
    }
    card.appendChild(btnRow);
    card.appendChild(feedback);
    if (coachOut) card.appendChild(coachOut);

    state.checkFns[field.id] = check;
    return { card: card, check: check, textarea: ta };
  }

  /* ---------- page chrome ---------- */

  function renderHeader(activity, opts) {
    opts = opts || {};
    var meta = activity.meta;
    var cover = imageEl(meta.cover_image, 'hero-bg');

    // With a cover image: the cinematic poster hero. Without: the light header.
    var header = el('header', (cover ? 'page-header hero' : 'page-header') + ' rise');
    if (cover) {
      header.appendChild(cover);
      header.appendChild(el('div', 'hero-scrim'));
      header.appendChild(el('div', 'hero-motif'));
    }
    var content = el('div', cover ? 'hero-content' : 'header-content');
    header.appendChild(content);

    var brand = el('div', 'brand-row');
    brand.appendChild(svgEl(SVG.logo, 'brand-logo'));
    var caption = el('div', 'brand-caption');
    caption.appendChild(el('span', null, 'Reskilling the World'));
    caption.appendChild(el('span', null, 'to AI & Tech'));
    brand.appendChild(caption);
    content.appendChild(brand);

    var kickerBits = [meta.program, meta.module, meta.lesson].filter(Boolean).join('  ·  ');
    if (kickerBits) content.appendChild(el('div', 'kicker', kickerBits));
    content.appendChild(el('h1', 'page-title', meta.title));
    if (activity.intro && activity.intro.headline) {
      content.appendChild(el('p', 'lede-headline', activity.intro.headline));
    }
    if (activity.intro && activity.intro.body) {
      content.appendChild(el('p', 'lede', activity.intro.body));
    }
    var illo = imageEl(activity.intro && activity.intro.illustration, 'intro-illustration');
    if (illo) content.appendChild(illo);

    var chips = el('div', 'meta-chips');
    if (meta.estimated_minutes) chips.appendChild(el('span', 'meta-chip', 'About ' + meta.estimated_minutes + ' minutes'));
    (opts.chips || []).forEach(function (c) { chips.appendChild(el('span', 'meta-chip', c)); });
    chips.appendChild(el('span', 'meta-chip ' + (liveOn() ? 'meta-chip-live' : ''),
      liveOn() ? 'Live coach on' : 'Local coach'));
    content.appendChild(chips);
    return header;
  }

  function renderSafetyNotice(activity) {
    var safety = activity.safety || {};
    if (!safety.student_notice) return null;
    var box = el('div', 'safety-notice rise');
    var head = el('div', 'safety-head');
    head.appendChild(svgEl(SVG.shield, 'safety-icon'));
    head.appendChild(el('strong', 'safety-title', 'Before you start: no personal data.'));
    box.appendChild(head);
    box.appendChild(el('p', 'safety-body', safety.student_notice));
    box.appendChild(el('p', 'safety-local', liveOn()
      ? 'Your work is saved only in this browser. When you ask the live coach, your answer text is scrubbed of emails, phone numbers, long numbers, and keys, then sent anonymously through Wawiwa’s proxy. Your identity is never sent because it is never collected.'
      : 'Everything you write stays in this browser on this device. This page sends nothing anywhere.'));
    return box;
  }

  function renderFooter(activity, state, opts) {
    opts = opts || {};
    var footer = el('footer', 'page-footer');
    var actions = el('div', 'footer-actions');

    var printBtn = el('button', 'btn btn-primary');
    printBtn.type = 'button';
    printBtn.appendChild(svgEl(SVG.download, 'btn-icon'));
    printBtn.appendChild(el('span', null, 'Export as PDF'));
    printBtn.addEventListener('click', function () {
      // code-generated PDF (engine/export.js): never the browser's print
      // dialog, so no URL/date footer, embedded or standalone
      window.PracticeExport.saveReport(activity, window.PracticeExport.genericData(activity, state));
    });
    actions.appendChild(printBtn);

    (opts.extraActions || []).forEach(function (a) { actions.appendChild(a); });

    var clearBtn = el('button', 'btn btn-ghost-danger', 'Clear my work');
    clearBtn.type = 'button';
    clearBtn.addEventListener('click', function () {
      if (window.confirm('Delete everything you wrote on this device? This cannot be undone.')) {
        clearAnswers(activity);
        window.location.reload();
      }
    });
    actions.appendChild(clearBtn);

    footer.appendChild(actions);
    footer.appendChild(el('div', 'footer-note', '© Wawiwa Tech | Confidential'));
    return footer;
  }

  /* ---------- level banner + rubric (shared by every format's review) ---------- */

  function levelBanner(evalResult) {
    var banner = el('div', 'level-banner level-' + evalResult.overall.levelIndex + ' pop-in');
    banner.appendChild(svgEl(LEVEL_BADGES[evalResult.overall.levelIndex], 'level-badge'));
    var textWrap = el('div', 'level-text');
    textWrap.appendChild(el('div', 'level-label', 'Overall level'));
    textWrap.appendChild(el('div', 'level-value', evalResult.overall.level));
    banner.appendChild(textWrap);

    // anonymous passback (Phase 4): present only in builds whose center
    // config enabled it. The signal goes to the center's own LMS; it carries
    // the level and score, never an identity.
    if (window.PracticePassback && window.PracticePassback.enabled()) {
      var sent = window.PracticePassback.report(evalResult);
      if (sent.sent) {
        textWrap.appendChild(el('div', 'level-passback',
          'Result reported anonymously to your center’s learning system.'));
      }
    }
    return banner;
  }

  function rubricBox(evalResult) {
    var box = el('div', 'rubric-box');
    box.appendChild(el('h3', 'panel-subtitle', 'Rubric check'));
    evalResult.rubric.forEach(function (r) {
      var row = el('div', 'rubric-row');
      row.appendChild(r.tag ? tagPill(r.tag) : el('span', 'tag-pill tag-none', 'Coach'));
      var textWrap = el('div', 'rubric-text');
      textWrap.appendChild(el('span', 'rubric-name', r.name + '. '));
      textWrap.appendChild(el('span', 'rubric-verdict', r.verdict));
      row.appendChild(textWrap);
      box.appendChild(row);
    });
    return box;
  }

  /* ---------- format registry + boot ---------- */

  var FORMATS = {};

  function registerFormat(name, renderFn) {
    FORMATS[name] = renderFn;
  }

  function newState(activity, checks) {
    return {
      activity: activity,
      checks: checks,
      answers: loadAnswers(activity),
      checkFns: {},
      coachButtons: []
    };
  }

  function boot() {
    var rootNode = document.getElementById('activity-root');
    var activity = window.ACTIVITY;
    var checks = window.CHECKS || {};
    if (!activity || !activity.meta) {
      rootNode.appendChild(el('p', 'engine-error', 'No activity spec was bundled into this page.'));
      return;
    }
    var format = FORMATS[activity.meta.format];
    if (!format) {
      rootNode.appendChild(el('p', 'engine-error',
        'The format "' + activity.meta.format + '" is not in this build’s format library yet.'));
      return;
    }
    document.title = 'Wawiwa · ' + activity.meta.title;
    document.body.classList.add('format-' + activity.meta.format);
    format(rootNode, activity, checks, newState(activity, checks));

    // for Export as PDF: let every textarea show its full content
    window.addEventListener('beforeprint', function () {
      Array.prototype.forEach.call(document.querySelectorAll('textarea'), function (ta) {
        ta.style.height = 'auto';
        ta.style.height = Math.max(ta.scrollHeight + 4, 40) + 'px';
      });
    });
  }

  window.PracticeCore = {
    el: el,
    svgEl: svgEl,
    imageEl: imageEl,
    SVG: SVG,
    liveOn: liveOn,
    tagPill: tagPill,
    feedbackBlock: feedbackBlock,
    appendResources: appendResources,
    coachBlock: coachBlock,
    coachThinking: coachThinking,
    coachFallback: coachFallback,
    coachButton: coachButton,
    fieldEditor: fieldEditor,
    renderHeader: renderHeader,
    renderSafetyNotice: renderSafetyNotice,
    renderFooter: renderFooter,
    levelBanner: levelBanner,
    rubricBox: rubricBox,
    saveAnswers: saveAnswers,
    registerFormat: registerFormat,
    boot: boot
  };

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
})();

/*
 * Practice Studio — the code-generated PDF export (shared by every format).
 *
 * Replaces window.print(): the browser's Save-as-PDF stamps its own header
 * and footer (the page URL and the date) whenever the activity runs inside
 * an embed (Rise), because the print margin belongs to the browser. This
 * helper draws the report itself with the vendored jsPDF (inlined at build
 * time, no CDN), so the file contains exactly what we draw — a branded
 * Mission Report with the Wawiwa red wordmark, navy headings, and the
 * student's own work — and never a browser footer, in any embed.
 *
 * Input is the same data model engine/mission.js buildReportSheet takes:
 *   { scoreline: {points, max, rank}, level: {index, label},
 *     sections: [{ title, cards: [{ num, title, tag,
 *                  rows: [{label, value, empty}] }] }] }
 * so each format hands the identical content to the on-screen report sheet
 * and to this file.
 *
 * No network code lives here; jsPDF's remote loaders are stripped from the
 * vendored copy. The PDF is assembled in memory and saved via a download.
 */
(function () {
  'use strict';

  /* the Wawiwa palette (matches :root in styles.css / the Mission skin) */
  var RED = [238, 49, 36];        // #EE3124
  var NAVY = [37, 87, 119];       // #255777 (Mission navy)
  var INK = [31, 44, 54];         // #1F2C36
  var SLATE = [111, 122, 138];    // #6F7A8A
  var LINE = [227, 233, 236];     // #E3E9EC
  var GOLD = [244, 180, 26];      // #F4B41A
  var TAG_RGB = {
    Ready: [46, 139, 87],         // --w-ready
    Light: [217, 136, 15],        // --w-light
    Revise: [193, 59, 59]         // --w-revise
  };
  var LEVEL_RGB = [TAG_RGB.Ready, TAG_RGB.Light, TAG_RGB.Revise];

  /* A4 metrics, mm */
  var PAGE_W = 210, PAGE_H = 297;
  var MARGIN = 14;
  var CONTENT_W = PAGE_W - 2 * MARGIN;
  var FOOT_Y = PAGE_H - 9;
  var BOTTOM = FOOT_Y - 6;

  /* The built-in PDF fonts encode Latin-1: map the typography the engine
     uses (curly quotes, dashes, ellipsis) and drop what cannot encode,
     rather than printing mojibake. */
  var CHAR_MAP = {
    '‘': "'", '’': "'", '‚': "'",
    '“': '"', '”': '"', '„': '"',
    '–': '-', '—': '-', '−': '-',
    '…': '...', ' ': ' ', '•': '-',
    '→': '->', '←': '<-', '✓': '+', '✔': '+',
    '✎': '', '●': '-'
  };
  function clean(value) {
    return String(value === null || value === undefined ? '' : value)
      .replace(/[‘’‚“”„–—−… •→←✓✔✎●]/g,
        function (c) { return CHAR_MAP[c]; })
      .replace(/[^\x09\x0A\x0D\x20-\xFF]/g, '');
  }

  function jsPdfCtor() {
    return (window.jspdf && window.jspdf.jsPDF) ? window.jspdf.jsPDF : null;
  }

  /* the red-tag wawiwa wordmark, drawn (same shape as the SVG logo) */
  function drawWordmark(doc, x, y) {
    doc.setFillColor(RED[0], RED[1], RED[2]);
    doc.roundedRect(x, y, 26, 8.6, 0.7, 0.7, 'F');
    doc.triangle(x + 5.6, y + 8.5, x + 10.4, y + 8.5, x + 5.6, y + 11.6, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(12.5);
    doc.setTextColor(255, 255, 255);
    doc.text('wawiwa', x + 13, y + 6, { align: 'center' });
  }

  function drawChip(doc, x, y, label, rgb) {
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    var w = doc.getTextWidth(label) + 5;
    doc.setFillColor(rgb[0], rgb[1], rgb[2]);
    doc.roundedRect(x, y, w, 5.4, 2.7, 2.7, 'F');
    doc.setTextColor(255, 255, 255);
    doc.text(label, x + w / 2, y + 3.8, { align: 'center' });
    return w;
  }

  /* every page gets the Wawiwa footer — ours, never the browser's */
  function drawPageFooters(doc) {
    var total = doc.getNumberOfPages();
    for (var i = 1; i <= total; i++) {
      doc.setPage(i);
      doc.setDrawColor(LINE[0], LINE[1], LINE[2]);
      doc.setLineWidth(0.25);
      doc.line(MARGIN, FOOT_Y - 3.4, PAGE_W - MARGIN, FOOT_Y - 3.4);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.setTextColor(SLATE[0], SLATE[1], SLATE[2]);
      doc.text('© Wawiwa Tech | Confidential', MARGIN, FOOT_Y);
      doc.text('Page ' + i + ' of ' + total, PAGE_W - MARGIN, FOOT_Y, { align: 'right' });
    }
  }

  /* the poster hero: navy band, wordmark, kicker, title, score, level */
  function drawHero(doc, activity, data) {
    var meta = activity.meta || {};
    var kicker = clean([meta.program, meta.module, meta.lesson].filter(Boolean).join('  ·  '));
    var title = clean('Mission Report  ·  ' + (meta.title || ''));

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    var titleLines = doc.splitTextToSize(title, CONTENT_W - 12);
    var heroH = 34 + titleLines.length * 6.6
      + (data.scoreline ? 9 : 0) + (data.level ? 10 : 0);

    doc.setFillColor(NAVY[0], NAVY[1], NAVY[2]);
    doc.rect(0, 0, PAGE_W, heroH, 'F');
    doc.setFillColor(RED[0], RED[1], RED[2]);
    doc.rect(0, heroH, PAGE_W, 1.6, 'F');

    drawWordmark(doc, MARGIN, 8);

    var y = 27;
    if (kicker) {
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(8.5);
      doc.setTextColor(GOLD[0], GOLD[1], GOLD[2]);
      doc.text(kicker.toUpperCase(), MARGIN, y);
    }
    y += 7;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.setTextColor(255, 255, 255);
    doc.text(titleLines, MARGIN, y);
    y += titleLines.length * 6.6;

    if (data.scoreline) {
      doc.setFontSize(12);
      doc.setTextColor(GOLD[0], GOLD[1], GOLD[2]);
      var pts = String(data.scoreline.points);
      doc.text(pts, MARGIN, y);
      var x = MARGIN + doc.getTextWidth(pts) + 2;
      doc.setFontSize(9);
      doc.setTextColor(255, 255, 255);
      var of = data.scoreline.max ? 'of ' + data.scoreline.max + ' Insight' : 'Insight';
      doc.text(of, x, y);
      if (data.scoreline.rank) {
        x += doc.getTextWidth(of) + 5;
        drawChip(doc, x, y - 4, clean(data.scoreline.rank), [62, 134, 143]);
      }
      y += 9;
    }
    if (data.level) {
      var rgb = LEVEL_RGB[data.level.index] || LEVEL_RGB[1];
      drawChip(doc, MARGIN, y - 4.5, 'Overall level: ' + clean(data.level.label), rgb);
      y += 10;
    }
    return heroH + 10;
  }

  /* one report: hero + sections of cards, flowing across pages */
  function buildDoc(activity, data) {
    var JsPDF = jsPdfCtor();
    var doc = new JsPDF({ unit: 'mm', format: 'a4', compress: true });
    var y = drawHero(doc, activity, data);

    function pageBreak(needed) {
      if (y + needed <= BOTTOM) return;
      doc.addPage();
      y = MARGIN + 4;
    }

    (data.sections || []).forEach(function (section) {
      pageBreak(16);
      doc.setFillColor(RED[0], RED[1], RED[2]);
      doc.rect(MARGIN, y - 3.2, 7, 1.4, 'F');
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(12);
      doc.setTextColor(NAVY[0], NAVY[1], NAVY[2]);
      doc.text(clean(section.title), MARGIN, y + 2.4);
      y += 9;

      (section.cards || []).forEach(function (card) {
        pageBreak(14);
        var x = MARGIN;
        if (card.num !== undefined && card.num !== null) {
          doc.setFillColor(RED[0], RED[1], RED[2]);
          doc.circle(x + 2.6, y + 0.6, 2.6, 'F');
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8.5);
          doc.setTextColor(255, 255, 255);
          doc.text(String(card.num), x + 2.6, y + 1.8, { align: 'center' });
          x += 7.5;
        }
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(10.5);
        doc.setTextColor(INK[0], INK[1], INK[2]);
        var tagW = card.tag ? doc.getTextWidth(card.tag) + 9 : 0;
        var headLines = doc.splitTextToSize(clean(card.title), CONTENT_W - (x - MARGIN) - tagW);
        doc.text(headLines, x, y + 2);
        if (card.tag) {
          drawChip(doc, PAGE_W - MARGIN - tagW + 3, y - 2,
            clean(card.tag), TAG_RGB[card.tag] || SLATE);
        }
        y += headLines.length * 5 + 2.5;

        (card.rows || []).forEach(function (row) {
          var rowX = MARGIN + 7.5;
          var rowW = CONTENT_W - 7.5;
          var value = clean(row.value);
          doc.setFontSize(9.5);
          if (row.label) {
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(SLATE[0], SLATE[1], SLATE[2]);
            pageBreak(6);
            doc.text(clean(row.label), rowX, y);
            y += 4.6;
          }
          doc.setFont('helvetica', row.empty ? 'italic' : 'normal');
          var g = row.empty ? SLATE : INK;
          doc.setTextColor(g[0], g[1], g[2]);
          var lines = doc.splitTextToSize(value, rowW);
          for (var i = 0; i < lines.length; i++) {
            pageBreak(5);
            doc.text(lines[i], rowX, y);
            y += 4.6;
          }
          y += 1.4;
        });

        doc.setDrawColor(LINE[0], LINE[1], LINE[2]);
        doc.setLineWidth(0.25);
        if (y + 4 <= BOTTOM) doc.line(MARGIN, y, PAGE_W - MARGIN, y);
        y += 6;
      });
      y += 2;
    });

    drawPageFooters(doc);
    return doc;
  }

  function fileName(activity) {
    var id = ((activity.meta || {}).id || 'activity').replace(/[^a-z0-9-]/gi, '-');
    return 'Wawiwa-' + id + '-report.pdf';
  }

  /* the one public entry: draw and download. Works inside an iframe embed;
     if the host frame blocks downloads, fall back to opening the blob in a
     new tab (still our PDF, still no browser footer). */
  function saveReport(activity, data) {
    if (!jsPdfCtor()) { window.print(); return; } // vendored lib missing: last resort
    var doc = buildDoc(activity, data || {});
    try {
      doc.save(fileName(activity));
    } catch (e) {
      try { window.open(doc.output('bloburl'), '_blank'); } catch (e2) { /* blocked twice: give up quietly */ }
    }
  }

  /* a generic data builder for chrome that only has activity + answers
     (core.js renderFooter): every section's fields and prompts, answered
     or not, in spec order. Formats with a richer report build their own. */
  function genericData(activity, state) {
    var sections = [];
    (activity.sections || []).forEach(function (section) {
      var items = section.type === 'fields' ? (section.fields || [])
        : (section.type === 'ordered_points' ? (section.prompts || []) : []);
      if (!items.length) return;
      sections.push({
        title: section.title,
        cards: items.map(function (item, i) {
          var text = ((state.answers || {})[item.id] || '').trim();
          return {
            num: i + 1,
            title: item.label,
            rows: [{ value: text || 'Not answered yet.', empty: !text }]
          };
        })
      });
    });
    return { sections: sections };
  }

  window.PracticeExport = {
    saveReport: saveReport,
    genericData: genericData,
    _clean: clean,
    _fileName: fileName
  };
})();

/*
 * Practice Studio, the Mission experience skin (Experience Library Phase E1).
 *
 * A shared design layer every format inherits: the scene-based layout
 * primitive (one thing on screen at a time, full-bleed, a calm zone for
 * text), the Wawiwa robot mentor as the visible face of the coach, the
 * Insight points + medallion + journey-map progress system, restrained
 * cinematic motion, and the designed one-page report export.
 *
 * Locked visual target: design-samples/wawiwa-mission-workbook-mockup.html
 * and wawiwa-mission-scenario-game.html. Palette and motif come from the
 * Wawiwa Image Style System.
 *
 * Rendering split (hybrid, locked): everything in this file is authored
 * SVG/CSS (crisp, offline, localizable). Each scene also has a raster
 * background slot: when a baked image is present (window.ASSETS), it renders
 * full-bleed under the scrim; when absent, the flat CSS/SVG poster backdrop
 * (teal/red/navy blocks + white line-art icons) fills in with the identical
 * layout, so Phase E2 backgrounds drop in with no rework.
 *
 * No mechanics live here. Formats keep their own checks, coach calls,
 * autosave, review, and passback; this layer only draws and counts.
 * No network code; nothing here fetches anything, ever.
 */
(function () {
  'use strict';

  var C = window.PracticeCore;
  var el = C.el;

  function reducedMotion() {
    try {
      return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    } catch (e) { return false; }
  }

  /* ================= the Wawiwa robot mentor (authored SVG) ================= */
  /* The friendly white robot with the teal + red eyes, per the Image Style
     System: rounded, approachable, identical in every appearance. */

  var ROBOT_MARKUP =
    '<rect x="14" y="18" width="36" height="30" rx="9" fill="#fff" stroke="#255777" stroke-width="2.5"/>'
    + '<rect x="20" y="25" width="24" height="14" rx="5" fill="#255777"/>'
    + '<circle cx="27" cy="32" r="3" fill="#5AB3AA"/><circle cx="37" cy="32" r="3" fill="#EE3124"/>'
    + '<path d="M28 36.5q4 2.6 8 0" fill="none" stroke="#5AB3AA" stroke-width="1.6" stroke-linecap="round"/>'
    + '<line x1="32" y1="10" x2="32" y2="18" stroke="#255777" stroke-width="2.5"/>'
    + '<circle cx="32" cy="9" r="3.2" fill="#EE3124"/>'
    + '<rect x="9" y="30" width="5" height="10" rx="2.5" fill="#3E868F"/>'
    + '<rect x="50" y="30" width="5" height="10" rx="2.5" fill="#3E868F"/>'
    + '<rect x="22" y="48" width="20" height="6" rx="3" fill="#255777"/>';

  function mentor(size, className) {
    return C.svgEl(
      '<svg viewBox="0 0 64 64" width="' + size + '" height="' + size + '" role="img" aria-label="Wawiwa AI Coach">'
      + ROBOT_MARKUP + '</svg>',
      className || 'm-bot');
  }

  /* small brand glyphs the skin uses (SVG, never emoji: crisp and printable) */
  var GLYPH = {
    star: '<svg viewBox="0 0 20 20" width="15" height="15" fill="#F4B41A"><path d="M10 1.6l2.5 5.2 5.7.7-4.2 3.9 1.1 5.6L10 14.2 4.9 17l1.1-5.6L1.8 7.5l5.7-.7z"/></svg>',
    medal: '<svg viewBox="0 0 64 64" width="44" height="44"><circle cx="32" cy="26" r="17" fill="#EE3124"/><circle cx="32" cy="26" r="17" fill="none" stroke="#F4B41A" stroke-width="4"/><circle cx="32" cy="26" r="11.5" fill="#2b6f74"/><path d="M25.5 26l4.6 4.6 8.4-10.4" stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><path d="M24 40l-3.4 15 11.4-6.4L43.4 55 40 40z" fill="#F4B41A"/></svg>',
    magnify: '<svg viewBox="0 0 20 20" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M13 13l4.5 4.5"/></svg>',
    lock: '<svg viewBox="0 0 20 20" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="4.5" y="9" width="11" height="8" rx="2"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>',
    check: '<svg viewBox="0 0 20 20" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10.5l4 4 8-9"/></svg>'
  };

  /* ================= the poster backdrop (background layer + slot) ================= */
  /* Layer order per the Image Style System: raster background slot (baked,
     E2) OR the flat CSS/SVG poster fallback, then the white line-art icon
     motif, then a scrim, then the SVG foreground and UI. */

  var PALETTES = [
    ['#5AB3AA', '#255777', '#EE3124'],
    ['#3E868F', '#EE3124', '#255777'],
    ['#255777', '#5AB3AA', '#F4B41A'],
    ['#EE3124', '#3E868F', '#255777'],
    ['#5AB3AA', '#EE3124', '#3E868F'],
    ['#255777', '#F4B41A', '#5AB3AA']
  ];

  function iconLayerMarkup() {
    // scattered white line-art tech shapes, the poster motif
    var s = '';
    for (var i = 0; i < 64; i++) {
      var x = Math.random() * 100, y = Math.random() * 100;
      var sz = 1.4 + Math.random() * 3, r = Math.random() * 360, sh = i % 4, g = '';
      if (sh === 0) {
        g = '<circle r="' + (sz / 2) + '" fill="none" stroke="#fff" stroke-width=".5"/>'
          + '<circle r="' + (sz / 7) + '" fill="#fff"/>';
      } else if (sh === 1) {
        g = '<rect x="' + (-sz / 2) + '" y="' + (-sz / 2) + '" width="' + sz + '" height="' + sz
          + '" rx=".6" fill="none" stroke="#fff" stroke-width=".5"/>';
      } else if (sh === 2) {
        g = '<path d="M' + (-sz / 2) + ' 0 A ' + (sz / 2) + ' ' + (sz / 2) + ' 0 0 1 ' + (sz / 2)
          + ' 0" fill="none" stroke="#fff" stroke-width=".5"/><circle r=".4" fill="#fff"/>';
      } else {
        g = '<line x1="' + (-sz / 2) + '" y1="0" x2="' + (sz / 2) + '" y2="0" stroke="#fff" stroke-width=".5"/>'
          + '<line x1="0" y1="' + (-sz / 2) + '" x2="0" y2="' + (sz / 2) + '" stroke="#fff" stroke-width=".5"/>';
      }
      s += '<g transform="translate(' + x + ' ' + y + ') rotate(' + r + ')">' + g + '</g>';
    }
    return s;
  }

  function buildBackdrop(host) {
    var bg = el('div', 'm-stage-bg');
    var img = el('div', 'm-bg-slot'); // the raster background slot (E2)
    bg.appendChild(img);
    var blobs = el('div', 'm-bg-blobs');
    bg.appendChild(blobs);
    host.appendChild(bg);
    var icons = C.svgEl(
      '<svg viewBox="0 0 100 100" preserveAspectRatio="none" width="100%" height="100%">'
      + iconLayerMarkup() + '</svg>', 'm-icons');
    host.appendChild(icons);
    host.appendChild(el('div', 'm-scrim'));

    return {
      /* set(index, rasterSrc): rasterSrc is a spec image reference; when it
         resolves through the baked asset map the raster fills the slot and
         the poster blobs step back. Layout is identical either way. */
      set: function (index, rasterSrc) {
        var p = PALETTES[((index % PALETTES.length) + PALETTES.length) % PALETTES.length];
        bg.style.background = 'linear-gradient(135deg, ' + p[1] + ' 0%, ' + p[0] + ' 100%)';
        blobs.textContent = '';
        [['46vw', '-8vw', '-10vw', p[2], '', ''],
         ['38vw', '', '-12vw', p[0], '-6vw', '.85'],
         ['26vw', '', '-8vw', p[1], '24vw', '.7']].forEach(function (b, i) {
          var blob = el('div', 'm-blob');
          blob.style.width = b[0]; blob.style.height = b[0];
          if (i === 0) { blob.style.left = b[1]; blob.style.top = b[2]; }
          else if (i === 1) { blob.style.right = b[4]; blob.style.bottom = b[2]; }
          else { blob.style.right = b[4]; blob.style.top = b[2]; }
          blob.style.background = b[3];
          if (b[5]) blob.style.opacity = b[5];
          blobs.appendChild(blob);
        });
        var raster = rasterSrc ? C.imageEl(rasterSrc, 'm-bg-img') : null;
        img.textContent = '';
        if (raster) img.appendChild(raster);
        bg.classList.toggle('m-has-raster', !!raster);
      }
    };
  }

  /* ================= points, medallion, journey (the progress system) ================= */

  /* Points come from activity-spec events, never from a lesson hardcode.
     The mapping can be overridden per activity via spec.mission.points. */
  var POINT_DEFAULTS = {
    strong: 40,   // a strong decision
    mixed: 15,    // a mixed decision
    weak: 0,      // a weak decision still teaches, but earns nothing
    field_ready: 25,  // a canvas field passing its check
    prompt_ready: 10  // a pitch point passing its check
  };

  function pointsConfig(activity) {
    var cfg = {};
    var override = (activity.mission || {}).points || {};
    Object.keys(POINT_DEFAULTS).forEach(function (k) {
      cfg[k] = (typeof override[k] === 'number') ? override[k] : POINT_DEFAULTS[k];
    });
    return cfg;
  }

  function buildMedallion(total) {
    var CIRC = 138.2;
    var wrap = C.svgEl(
      '<svg viewBox="0 0 52 52" width="46" height="46" class="m-medal-svg" role="img" aria-label="Mission progress">'
      + '<circle class="m-medal-track" cx="26" cy="26" r="22" fill="none" stroke-width="5"/>'
      + '<circle class="m-medal-fill" cx="26" cy="26" r="22" fill="none" stroke-width="5" stroke-linecap="round"'
      + ' stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + CIRC + '" transform="rotate(-90 26 26)"/>'
      + '<text class="m-medal-lbl" x="26" y="30" text-anchor="middle">0/' + total + '</text></svg>',
      'm-medallion');
    return {
      node: wrap,
      set: function (done, totalNow) {
        var t = totalNow || total || 1;
        var fill = wrap.querySelector('.m-medal-fill');
        var lbl = wrap.querySelector('.m-medal-lbl');
        fill.style.strokeDashoffset = String(CIRC * (1 - Math.min(done, t) / t));
        lbl.textContent = done + '/' + t;
        wrap.classList.toggle('m-medal-full', done >= t);
      }
    };
  }

  /* The journey map: one node per stop; nodes light up while active and lock
     in gold when done. Rendered as HUD dots (game) or a board rail (canvas). */
  function buildJourneyDots(items, onNav) {
    var wrap = el('div', 'm-journey');
    var nodes = {};
    items.forEach(function (item) {
      var n = el(onNav ? 'button' : 'span', 'm-node');
      if (onNav) {
        n.type = 'button';
        n.addEventListener('click', function () { onNav(item.id); });
      }
      n.title = item.label || '';
      wrap.appendChild(n);
      nodes[item.id] = n;
    });
    return {
      node: wrap,
      /* state: 'todo' | 'active' | 'done' */
      set: function (id, stateName) {
        var n = nodes[id];
        if (!n) return;
        n.className = 'm-node' + (stateName !== 'todo' ? ' m-node-' + stateName : '');
      }
    };
  }

  /* ================= the top bar HUD ================= */

  function buildHud(activity, opts) {
    opts = opts || {};
    var meta = activity.meta;
    var bar = el('div', 'm-topbar');
    bar.appendChild(C.svgEl(C.SVG.logo, 'm-logo'));
    var brand = el('div', 'm-brandline');
    brand.appendChild(el('span', 'm-brand-k',
      [meta.program, meta.module, meta.lesson].filter(Boolean).join('  ·  ')));
    brand.appendChild(el('span', 'm-brand-t', meta.title));
    bar.appendChild(brand);

    var hudRight = el('div', 'm-hud');
    (opts.extras || []).forEach(function (x) { hudRight.appendChild(x); });

    var chip = el('div', 'm-chip');
    chip.appendChild(C.svgEl(GLYPH.star, 'm-chip-ic'));
    var pts = el('b', null, '0');
    chip.appendChild(pts);
    chip.appendChild(el('span', null, 'Insight'));
    hudRight.appendChild(chip);

    var medallion = buildMedallion(opts.total || 1);
    hudRight.appendChild(medallion.node);

    var journey = null;
    if (opts.journeyItems) {
      journey = buildJourneyDots(opts.journeyItems, opts.onNav);
      hudRight.appendChild(journey.node);
    }
    bar.appendChild(hudRight);

    var current = 0;
    return {
      node: bar,
      medallion: medallion,
      journey: journey,
      setPoints: function (n) {
        n = Math.max(0, n | 0);
        if (n !== current) {
          pts.textContent = String(n);
          if (!reducedMotion()) {
            chip.classList.remove('m-chip-bump');
            void chip.offsetWidth;
            chip.classList.add('m-chip-bump');
          }
          current = n;
        }
      }
    };
  }

  /* ================= the reward toast (a beat, not a blocker) ================= */

  var toastNode = null, toastTimer = null;
  function toast(title, points) {
    if (!toastNode) {
      toastNode = el('div', 'm-toast');
      toastNode.setAttribute('role', 'status');
      document.body.appendChild(toastNode);
    }
    toastNode.textContent = '';
    toastNode.appendChild(C.svgEl(GLYPH.medal, 'm-toast-medal'));
    toastNode.appendChild(el('div', 'm-toast-big', title));
    if (points) toastNode.appendChild(el('div', 'm-toast-pts', '+' + points + ' Insight'));
    toastNode.classList.add('m-toast-show');
    if (toastTimer) window.clearTimeout(toastTimer);
    toastTimer = window.setTimeout(function () {
      toastNode.classList.remove('m-toast-show');
    }, reducedMotion() ? 2400 : 1700);
  }

  /* ================= the mentor coach panel ================= */
  /* The visible face of the coach. say() shows the per-scene line; formats
     keep routing their existing feedback text through it unchanged. */

  function buildCoachPanel(opts) {
    opts = opts || {};
    var card = el('div', 'm-coach-card');
    var who = el('div', 'm-coach-who');
    who.appendChild(mentor(44));
    var names = el('div', 'm-coach-names');
    names.appendChild(el('b', null, 'Wawiwa AI Coach'));
    names.appendChild(el('span', null, opts.subtitle || 'riding along'));
    who.appendChild(names);
    card.appendChild(who);
    var line = el('p', 'm-coach-line', opts.line || '');
    card.appendChild(line);

    var wrap = el('div', 'm-coach');
    wrap.appendChild(card);
    var goal = null, reward = null;
    return {
      node: wrap,
      say: function (text) { line.textContent = text || ''; },
      goal: function (label, text) {
        if (!goal) {
          goal = el('div', 'm-goal');
          goal.appendChild(el('div', 'm-goal-k', label));
          goal.appendChild(el('p', 'm-goal-p', text));
          wrap.appendChild(goal);
        } else {
          goal.querySelector('.m-goal-k').textContent = label;
          goal.querySelector('.m-goal-p').textContent = text;
        }
      },
      reward: function (text) {
        if (!reward) {
          reward = el('div', 'm-reward');
          reward.appendChild(C.svgEl(GLYPH.star, 'm-chip-ic'));
          reward.appendChild(el('span', null, text));
          wrap.appendChild(reward);
        } else {
          reward.lastChild.textContent = text;
        }
      }
    };
  }

  /* ================= the scene primitive + the stage ================= */
  /* One thing on screen at a time: a full-bleed backdrop, and a single calm
     white panel (the scene card) swapped with a cinematic but restrained
     beat. Reduced motion swaps instantly. */

  var SWAP_MS = 460;

  function buildScene(opts) {
    opts = opts || {};
    var scene = el('section', 'm-scene' + (opts.className ? ' ' + opts.className : ''));
    var head = null, body = el('div', 'm-scene-body'), foot = null;
    if (opts.badge || opts.title) {
      head = el('div', 'm-scene-head');
      if (opts.badge) head.appendChild(el('span', 'm-badge', opts.badge));
      var hwrap = el('div', 'm-scene-headings');
      if (opts.eyebrow) hwrap.appendChild(el('div', 'm-eyebrow', opts.eyebrow));
      if (opts.title) hwrap.appendChild(el('h1', 'm-scene-title', opts.title));
      head.appendChild(hwrap);
      scene.appendChild(head);
    }
    scene.appendChild(body);
    return {
      node: scene,
      body: body,
      foot: function () {
        if (!foot) {
          foot = el('div', 'm-scene-foot');
          scene.appendChild(foot);
        }
        return foot;
      }
    };
  }

  function buildStage(host) {
    var wrap = el('div', 'm-stagewrap');
    host.appendChild(wrap);
    return {
      node: wrap,
      swap: function (sceneNode) {
        var old = wrap.firstElementChild;
        if (reducedMotion()) {
          wrap.textContent = '';
          wrap.appendChild(sceneNode);
          return;
        }
        sceneNode.classList.add('m-enter');
        wrap.appendChild(sceneNode);
        if (old) {
          old.classList.add('m-exit');
          window.setTimeout(function () { if (old.parentNode) old.remove(); }, SWAP_MS);
        }
      }
    };
  }

  /* The full app shell: backdrop + topbar + stage, taking over the viewport.
     Formats call this once, then swap scenes on the stage. */
  function buildShell(rootNode, activity, hudOpts) {
    document.body.classList.add('mission-active');
    // the backdrop layers are fixed and siblings of the app, so the scrim
    // sits between the poster and the UI, never over the UI
    var backdrop = buildBackdrop(rootNode);
    var app = el('div', 'm-app');
    var hud = buildHud(activity, hudOpts);
    app.appendChild(hud.node);
    var main = el('div', 'm-main');
    app.appendChild(main);
    rootNode.appendChild(app);
    return { app: app, main: main, backdrop: backdrop, hud: hud };
  }

  /* ================= the designed report (one page, on-brand) ================= */
  /* A designed artifact, not a form printout: poster hero with the motif and
     the medal, a score line, then case cards. Formats hand rows in; nothing
     about a specific lesson lives here. */

  function buildReportSheet(activity, data) {
    var container = document.querySelector('.container') || document.body;
    var old = container.querySelector('.m-report-sheet');
    if (old) old.remove();
    var sheet = el('div', 'm-report-sheet');

    var hero = el('div', 'm-rep-hero');
    hero.appendChild(el('div', 'm-rep-motif'));
    var inner = el('div', 'm-rep-hero-inner');
    inner.appendChild(C.svgEl(C.SVG.logo, 'm-rep-logo'));
    var meta = activity.meta;
    inner.appendChild(el('div', 'm-rep-kicker',
      [meta.program, meta.module, meta.lesson].filter(Boolean).join('  ·  ')));
    inner.appendChild(el('h1', 'm-rep-title', 'Mission Report  ·  ' + meta.title));
    if (data.scoreline) {
      var score = el('div', 'm-rep-score');
      score.appendChild(el('span', 'm-rep-score-n', String(data.scoreline.points)));
      score.appendChild(el('span', 'm-rep-score-of',
        data.scoreline.max ? 'of ' + data.scoreline.max + ' Insight' : 'Insight'));
      if (data.scoreline.rank) score.appendChild(el('span', 'm-rep-rank', data.scoreline.rank));
      inner.appendChild(score);
    }
    if (data.level) {
      inner.appendChild(el('div', 'm-rep-level m-rep-level-' + data.level.index, data.level.label));
    }
    hero.appendChild(inner);
    var medal = C.svgEl(GLYPH.medal, 'm-rep-medal');
    hero.appendChild(medal);
    sheet.appendChild(hero);

    (data.sections || []).forEach(function (section) {
      var block = el('div', 'm-rep-section');
      block.appendChild(el('h2', 'm-rep-section-title', section.title));
      var grid = el('div', 'm-rep-cards' + (section.wide ? ' m-rep-wide' : ''));
      (section.cards || []).forEach(function (cardData) {
        var card = el('div', 'm-rep-card');
        var headRow = el('div', 'm-rep-card-head');
        if (cardData.num) headRow.appendChild(el('span', 'm-rep-card-num', String(cardData.num)));
        headRow.appendChild(el('span', 'm-rep-card-title', cardData.title));
        if (cardData.tag) {
          var t = el('span', 'm-rep-tag m-rep-tag-' + cardData.tag.toLowerCase(), cardData.tag);
          headRow.appendChild(t);
        }
        card.appendChild(headRow);
        (cardData.rows || []).forEach(function (row) {
          var r = el('div', 'm-rep-row');
          if (row.label) r.appendChild(el('b', 'm-rep-row-label', row.label + ' '));
          r.appendChild(el('span', 'm-rep-row-value' + (row.empty ? ' m-rep-empty' : ''), row.value));
          card.appendChild(r);
        });
        grid.appendChild(card);
      });
      block.appendChild(grid);
      sheet.appendChild(block);
    });

    var foot = el('div', 'm-rep-foot');
    foot.appendChild(el('span', null, '© Wawiwa Tech | Confidential'));
    sheet.appendChild(foot);
    container.appendChild(sheet);
    document.body.classList.add('has-mission-report');
  }

  window.PracticeMission = {
    reducedMotion: reducedMotion,
    mentor: mentor,
    GLYPH: GLYPH,
    PALETTES: PALETTES,
    pointsConfig: pointsConfig,
    buildBackdrop: buildBackdrop,
    buildMedallion: buildMedallion,
    buildJourneyDots: buildJourneyDots,
    buildHud: buildHud,
    buildCoachPanel: buildCoachPanel,
    buildScene: buildScene,
    buildStage: buildStage,
    buildShell: buildShell,
    toast: toast,
    buildReportSheet: buildReportSheet
  };
})();

/*
 * Practice Studio format: branching_scenario, the Mission decision game.
 *
 * Rendered through the shared Mission skin (engine/mission.js): a full-bleed
 * poster backdrop with a per-scene raster slot, one calm scene card at a
 * time, the robot mentor voicing the existing feedback text, Insight points,
 * a medallion that fills, a journey map that locks in gold, a
 * consequence-reveal beat, and a designed Mission Report PDF.
 *
 * Every mechanic is unchanged: decisions resolve through
 * PracticeFeedback.evaluateDecision, reflections through the shared
 * fieldEditor, the review through evaluateActivity + the shared level banner
 * (which is also where passback hooks), autosave through the same answer
 * keys. This file is presentation only.
 */
(function () {
  'use strict';

  var C = window.PracticeCore;
  var M = window.PracticeMission;
  var FB = window.PracticeFeedback;
  var el = C.el;
  var PATH_KEY = '_scenePath';

  /* ---------- spec helpers (unchanged mechanics) ---------- */

  function scenesOf(activity) { return FB.collectScenes(activity); }

  function sceneById(activity, id) {
    return scenesOf(activity).filter(function (s) { return s.id === id; })[0] || null;
  }

  function nextSceneId(activity, scene, option) {
    if (option && option.goto !== undefined) return option.goto;
    var all = scenesOf(activity);
    var idx = all.indexOf(scene);
    return idx >= 0 && idx + 1 < all.length ? all[idx + 1].id : null;
  }

  /* ---------- Insight points: spec-driven, derived from decisions ---------- */

  function optionPoints(option, cfg) {
    if (typeof option.points === 'number') return option.points;
    return cfg[option.quality] || 0;
  }

  function decidedOption(activity, scene, state) {
    var chosenId = state.answers[FB.decisionKey(scene)];
    if (!chosenId) return null;
    return (scene.decision.options || []).filter(function (o) {
      return o.id === chosenId;
    })[0] || null;
  }

  function tallyPoints(activity, state, cfg) {
    var total = 0;
    scenesOf(activity).forEach(function (scene) {
      var option = decidedOption(activity, scene, state);
      if (option) total += optionPoints(option, cfg);
    });
    return total;
  }

  function maxPointsOnPath(activity, state, cfg) {
    var max = 0;
    (state.answers[PATH_KEY] || []).forEach(function (sceneId) {
      var scene = sceneById(activity, sceneId);
      if (!scene) return;
      max += Math.max.apply(null, (scene.decision.options || []).map(function (o) {
        return optionPoints(o, cfg);
      }).concat([0]));
    });
    return max;
  }

  /* ---------- HUD refresh: points, medallion, journey ---------- */

  var RECAP_NODE = '_recap';

  function refreshHud(activity, state) {
    var cfg = state.missionPoints;
    state.shell.hud.setPoints(tallyPoints(activity, state, cfg));
    var all = scenesOf(activity);
    var decided = all.filter(function (s) { return !!decidedOption(activity, s, state); });
    state.shell.hud.medallion.set(state.atEnding ? all.length : decided.length, all.length);
    var journey = state.shell.hud.journey;
    if (journey) {
      all.forEach(function (s) {
        var isDecided = !!decidedOption(activity, s, state);
        var isCurrent = !state.atEnding && state.currentSceneId === s.id;
        journey.set(s.id, isCurrent ? 'active' : (isDecided ? 'done' : 'todo'));
      });
      journey.set(RECAP_NODE, state.atEnding ? 'done' : 'todo');
    }
  }

  /* ---------- the title scene ---------- */

  function buildTitleScene(activity, state, onStart) {
    var scene = M.buildScene({
      eyebrow: [activity.meta.program, activity.meta.module].filter(Boolean).join('  ·  '),
      title: activity.meta.title
    });
    scene.node.querySelector('.m-scene-title').classList.add('m-scene-title-big');
    if (activity.intro && activity.intro.body) {
