      scene.body.appendChild(el('p', 'm-lead', activity.intro.body));
    }

    var say = el('div', 'm-mentor-say');
    say.appendChild(M.mentor(50));
    var sayBody = el('div');
    sayBody.appendChild(el('b', null, 'Wawiwa AI Coach'));
    sayBody.appendChild(el('div', 'm-mentor-text',
      'I ride along on every stop. Read the scene, make your call, and I will tell you where it lands.'));
    say.appendChild(sayBody);
    scene.body.appendChild(say);

    var chips = el('div', 'meta-chips title-chips');
    if (activity.meta.estimated_minutes) {
      chips.appendChild(el('span', 'meta-chip', activity.meta.estimated_minutes + ' min'));
    }
    chips.appendChild(el('span', 'meta-chip', scenesOf(activity).filter(function (s) {
      return !/detour/i.test(s.kicker || '');
    }).length + ' decisions'));
    chips.appendChild(el('span', 'meta-chip' + (C.liveOn() ? ' meta-chip-live' : ''),
      C.liveOn() ? 'Live coach' : 'Local coach'));
    scene.body.appendChild(chips);

    // the PII rule, one glance; the full authored notice one tap away
    var safety = el('div', 'safety-mini game-safety');
    var line = el('button', 'safety-line');
    line.type = 'button';
    line.appendChild(C.svgEl(C.SVG.shield, 'safety-glyph'));
    line.appendChild(el('span', null, 'No real names, IDs, or secrets. Generalize.'));
    var full = el('div', 'safety-full');
    full.appendChild(el('p', null, (activity.safety || {}).student_notice || ''));
    var clearBtn = el('button', 'btn btn-ghost btn-small', 'Clear my work');
    clearBtn.type = 'button';
    clearBtn.addEventListener('click', function () {
      if (window.confirm('Delete everything you wrote on this device? This cannot be undone.')) {
        try { localStorage.removeItem('practice-studio:' + activity.meta.id); } catch (e) { /* ignore */ }
        window.location.reload();
      }
    });
    full.appendChild(clearBtn);
    line.addEventListener('click', function () { full.classList.toggle('safety-open'); });
    safety.appendChild(line);
    safety.appendChild(full);
    scene.body.appendChild(safety);

    var foot = scene.foot();
    foot.appendChild(el('span', 'm-spacer'));
    var started = (state.answers[PATH_KEY] || []).length > 0;
    var start = el('button', 'btn btn-primary btn-large', started ? 'Continue your mission' : 'Start the mission');
    start.type = 'button';
    start.addEventListener('click', onStart);
    foot.appendChild(start);
    return scene.node;
  }

  /* ---------- one scene card at a time ---------- */

  function buildSceneCard(activity, state, scene, onAdvance) {
    var all = scenesOf(activity);
    var stop = all.indexOf(scene) + 1;
    var card = M.buildScene({
      badge: 'Stop ' + stop + ' / ' + all.length,
      eyebrow: scene.kicker || 'Decision',
      title: scene.title
    });
    if (scene.setup) card.body.appendChild(el('p', 'm-lead', scene.setup));
    card.body.appendChild(el('p', 'm-ask', scene.decision.prompt));

    var choices = el('div', 'm-choices');
    card.body.appendChild(choices);

    // the consequence beat: the mentor reacts inside the calm zone
    var cq = el('div', 'm-cq');
    card.body.appendChild(cq);

    function showConsequence(option, isFresh) {
      var d = FB.evaluateDecision(scene, option.id, activity, state.checks);
      cq.textContent = '';
      cq.classList.remove('m-cq-shown');
      void cq.offsetWidth; // restart the reveal beat
      cq.classList.add('m-cq-shown');

      var who = el('div', 'm-cq-who');
      who.appendChild(M.mentor(30));
      who.appendChild(el('b', null, 'Wawiwa AI Coach'));
      who.appendChild(C.tagPill(d.tag));
      (option.routes_to || []).forEach(function (key) {
        var num = (key.match(/\d+/) || [''])[0];
        var route = el('span', 'route-chip');
        route.title = (activity.lesson_map || {})[key] || key;
        route.appendChild(el('span', null, 'Lesson ' + num));
        who.appendChild(route);
      });
      cq.appendChild(who);
      cq.appendChild(el('p', 'm-cq-text', option.consequence));
      var pts = optionPoints(option, state.missionPoints);
      cq.appendChild(el('div', 'm-cq-pts' + (pts > 0 ? '' : ' m-cq-pts-none'),
        pts > 0 ? '+' + pts + ' Insight' : 'No Insight this time, but now you know.'));
      if (d.resources && d.resources.length) {
        var reads = el('div', 'cq-resources');
        C.appendResources(reads, d.resources);
        cq.appendChild(reads);
      }

      if (scene.reflection) {
        var editor = C.fieldEditor(state, activity, scene.reflection, {
          embedded: true,
          badge: '✎',
          checkLabel: 'Check'
        });
        editor.card.classList.add('game-reflect');
        cq.appendChild(editor.card);
      }

      var nextId = nextSceneId(activity, scene, option);
      var row = el('div', 'm-cq-actions');
      var advance = el('button', 'btn btn-primary', nextId ? 'Continue' : 'See the mission report');
      advance.type = 'button';
      advance.addEventListener('click', function () { onAdvance(nextId); });
      row.appendChild(advance);
      cq.appendChild(row);

      if (isFresh) {
        refreshHud(activity, state);
        if (pts > 0) M.toast(d.tag === 'Ready' ? 'A sharp call' : 'Call logged', pts);
      }
    }

    var letters = ['A', 'B', 'C', 'D'];
    (scene.decision.options || []).forEach(function (option, i) {
      var tile = el('button', 'm-choice');
      tile.type = 'button';
      tile.appendChild(el('span', 'm-choice-key', letters[i] || '•'));
      tile.appendChild(el('span', 'm-choice-label', option.label));
      tile.addEventListener('click', function () {
        if (state.answers[FB.decisionKey(scene)]) return; // a call commits once
        state.answers[FB.decisionKey(scene)] = option.id;
        C.saveAnswers(activity, state.answers);
        Array.prototype.forEach.call(choices.children, function (c) {
          c.classList.add('m-choice-dim');
          c.classList.add('m-choice-lock');
        });
        tile.classList.remove('m-choice-dim');
        tile.classList.add('m-choice-committed');
        showConsequence(option, true);
      });
      choices.appendChild(tile);
    });

    var foot = card.foot();
    foot.appendChild(el('span', 'm-foot-note', scene.kicker || ''));
    foot.appendChild(el('span', 'm-spacer'));
    foot.appendChild(el('span', 'm-foot-note', 'Stop ' + stop + ' of ' + all.length));

    // resume: a decision already made on this scene replays its consequence
    var chosen = decidedOption(activity, scene, state);
    if (chosen) {
      Array.prototype.forEach.call(choices.children, function (c, i) {
        var isChosen = (scene.decision.options[i] || {}).id === chosen.id;
        c.classList.add('m-choice-lock');
        c.classList.toggle('m-choice-committed', isChosen);
        c.classList.toggle('m-choice-dim', !isChosen);
      });
      showConsequence(chosen, false);
    }
    return card.node;
  }

  /* ---------- the ending: the mission report scene ---------- */

  function rankFor(activity, pts, max) {
    if (!max) return null;
    var pct = Math.round(100 * pts / max);
    var ranks = ((activity.mission || {}).ranks || []);
    for (var i = 0; i < ranks.length; i++) {
      if (pct >= (ranks[i].min_pct || 0)) return ranks[i].label;
    }
    return null;
  }

  function buildEndingScene(activity, state) {
    var cfg = state.missionPoints;
    var pts = tallyPoints(activity, state, cfg);
    var max = maxPointsOnPath(activity, state, cfg);
    var rank = rankFor(activity, pts, max);

    var scene = M.buildScene({
      eyebrow: 'End of the mission',
      title: 'Where your path led'
    });

    var scoreline = el('div', 'm-scoreline');
    scoreline.appendChild(el('span', 'm-score-n', String(pts)));
    var scoreRest = el('span', 'm-score-of', 'of ' + max + ' Insight');
    scoreline.appendChild(scoreRest);
    if (rank) scoreline.appendChild(el('span', 'm-rank', rank));
    scene.body.appendChild(scoreline);

    var recap = el('div', 'm-recap');
    (state.answers[PATH_KEY] || []).forEach(function (sceneId, i) {
      var s = sceneById(activity, sceneId);
      if (!s) return;
      var d = FB.evaluateDecision(s, state.answers[FB.decisionKey(s)], activity, state.checks);
      var row = el('div', 'm-recap-row');
      row.appendChild(el('span', 'm-recap-step', String(i + 1)));
      var body = el('div', 'm-recap-body');
      body.appendChild(el('div', 'm-recap-title', s.title));
      if (d.option) body.appendChild(el('div', 'm-recap-choice', d.option.label));
      row.appendChild(body);
      row.appendChild(d.tag ? C.tagPill(d.tag) : el('span', 'tag-pill tag-none', '·'));
      recap.appendChild(row);
    });
    scene.body.appendChild(recap);

    var btn = el('button', 'btn btn-teal', 'Review my scenario');
    btn.type = 'button';
    var out = el('div', 'review-out');
    var coachOut = C.liveOn() ? el('div', 'feedback') : null;

    btn.addEventListener('click', function () {
      out.textContent = '';
      var evalResult = FB.evaluateActivity(activity, state.checks, state.answers);
      state.lastEval = evalResult;
      out.appendChild(C.levelBanner(evalResult));
      out.appendChild(C.rubricBox(evalResult));
      out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    var btnRow = el('div', 'btn-row ending-actions');
    btnRow.appendChild(btn);
    if (coachOut) {
      btnRow.appendChild(C.coachButton(state, 'Mentor debrief', function (b) {
        b.disabled = true;
        C.coachThinking(coachOut);
        window.PracticeLive.coachCanvas(activity, state.answers)
          .then(function (r) { b.disabled = false; C.coachBlock(coachOut, r.text, null); })
          .catch(function (err) { b.disabled = false; C.coachFallback(state, coachOut, err, function () { btn.click(); }); });
      }));
    }
    scene.body.appendChild(btnRow);
    if (coachOut) scene.body.appendChild(coachOut);
    scene.body.appendChild(out);

    var foot = scene.foot();
    var restartBtn = el('button', 'btn btn-ghost', 'Play a different path');
    restartBtn.type = 'button';
    restartBtn.addEventListener('click', function () {
      if (!window.confirm('Start over? Decisions reset; reflections stay saved.')) return;
      scenesOf(activity).forEach(function (s) { delete state.answers[FB.decisionKey(s)]; });
      state.answers[PATH_KEY] = [];
      C.saveAnswers(activity, state.answers);
      window.location.reload();
    });
    foot.appendChild(restartBtn);
    foot.appendChild(el('span', 'm-spacer'));
    var printBtn = el('button', 'btn btn-primary');
    printBtn.type = 'button';
    printBtn.appendChild(C.svgEl(C.SVG.download, 'btn-icon'));
    printBtn.appendChild(el('span', null, 'Save the mission report (PDF)'));
    printBtn.addEventListener('click', function () {
      // code-generated PDF: no browser print footer, embed-safe
      window.PracticeExport.saveReport(activity, reportData(activity, state));
    });
    foot.appendChild(printBtn);
    return scene.node;
  }

  /* ---------- the designed export: the Mission Report ---------- */

  /* one data model feeds both the on-screen report sheet (browser print
     path) and the code-generated PDF (engine/export.js) */
  function reportData(activity, state) {
    var cfg = state.missionPoints;
    var pts = tallyPoints(activity, state, cfg);
    var max = maxPointsOnPath(activity, state, cfg);

    var pathCards = [];
    (state.answers[PATH_KEY] || []).forEach(function (sceneId, i) {
      var s = sceneById(activity, sceneId);
      if (!s) return;
      var d = FB.evaluateDecision(s, state.answers[FB.decisionKey(s)], activity, state.checks);
      var rows = [];
      if (d.option) {
        rows.push({ label: 'Your call:', value: d.option.label });
        rows.push({ label: 'Where it led:', value: d.option.consequence });
      } else {
        rows.push({ value: 'No call made on this stop.', empty: true });
      }
      pathCards.push({ num: i + 1, title: s.title, tag: d.tag || null, rows: rows });
    });

    var reflectionCards = [];
    FB.collectFields(activity).forEach(function (field, i) {
      var text = (state.answers[field.id] || '').trim();
      reflectionCards.push({
        num: i + 1,
        title: field.label,
        rows: [{ value: text || 'Not written yet.', empty: !text }]
      });
    });

    var level = state.lastEval ? {
      index: state.lastEval.overall.levelIndex,
      label: state.lastEval.overall.level
    } : null;

    return {
      scoreline: { points: pts, max: max, rank: rankFor(activity, pts, max) },
      level: level,
      sections: [
        { title: 'Your path', cards: pathCards, wide: true },
        { title: 'Your reflections', cards: reflectionCards }
      ]
    };
  }

  function buildReport(activity, state) {
    M.buildReportSheet(activity, reportData(activity, state));
  }

  /* ---------- the format ---------- */

  function renderBranchingScenario(rootNode, activity, checks, state) {
    if (!Array.isArray(state.answers[PATH_KEY])) state.answers[PATH_KEY] = [];
    state.missionPoints = M.pointsConfig(activity);

    var all = scenesOf(activity);
    var journeyItems = all.map(function (s) {
      return { id: s.id, label: s.title };
    }).concat([{ id: RECAP_NODE, label: 'Mission report' }]);

    state.shell = M.buildShell(rootNode, activity, {
      total: all.length,
      journeyItems: journeyItems
    });
    var stage = M.buildStage(state.shell.main);

    window.addEventListener('beforeprint', function () {
      buildReport(activity, state);
    });

    if (!all.length) {
      state.shell.main.appendChild(el('p', 'engine-error', 'This activity has no scenes to play.'));
      return;
    }

    function playScene(sceneId) {
      var scene = sceneById(activity, sceneId);
      if (!scene) { showEnding(); return; }
      var path = state.answers[PATH_KEY];
      if (path.indexOf(sceneId) === -1) {
        path.push(sceneId);
        C.saveAnswers(activity, state.answers);
      }
      state.currentSceneId = sceneId;
      state.atEnding = false;
      state.shell.backdrop.set(all.indexOf(scene), scene.background || scene.image);
      stage.swap(buildSceneCard(activity, state, scene, function (nextId) {
        if (nextId) playScene(nextId);
        else showEnding();
      }));
      refreshHud(activity, state);
    }

    function showEnding() {
      state.atEnding = true;
      state.currentSceneId = null;
      state.shell.backdrop.set(all.length, activity.meta.background || null);
      stage.swap(buildEndingScene(activity, state));
      refreshHud(activity, state);
    }

    function resume() {
      var path = state.answers[PATH_KEY];
      if (!path.length) { playScene(all[0].id); return; }
      // pick up at the frontier: the last visited scene, or past its decision
      var last = sceneById(activity, path[path.length - 1]);
      var decided = state.answers[FB.decisionKey(last)];
      if (!decided) { playScene(last.id); return; }
      var option = (last.decision.options || []).filter(function (o) { return o.id === decided; })[0];
      var nid = nextSceneId(activity, last, option);
      if (nid === null) showEnding();
      else if (path.indexOf(nid) === -1) playScene(nid);
      else playScene(path[path.length - 1]);
    }

    state.shell.backdrop.set(0, activity.meta.background || activity.meta.cover_image);
    stage.swap(buildTitleScene(activity, state, resume));
    refreshHud(activity, state);
  }

  C.registerFormat('branching_scenario', renderBranchingScenario);
})();

/*
 * Practice Studio format: coached_canvas, the Mission workbook.
 *
 * Rendered through the shared Mission skin (engine/mission.js): the fields
 * are case tiles on the Mission Board rail (the journey map), and one field
 * plays at a time as a calm scene card over the full-bleed poster backdrop,
 * with the robot mentor coaching from the side column. Insight points and
 * the medallion track Ready fields; a reward toast lands each one. The
 * mission ends on a review scene and a designed one-page report export.
 *
 * Mechanics are identical to before: the same field editors, local checks,
 * live coach, review (levelBanner is where passback hooks), and autosave.
 * This file is layout and motion only.
 */
(function () {
  'use strict';

  var C = window.PracticeCore;
  var M = window.PracticeMission;
  var FB = window.PracticeFeedback;
  var el = C.el;

  var INTRO_ID = '_intro';
  var REVIEW_ID = '_review';

  /* ---------- the playable stops: intro, every field/prompt, review ---------- */

  function collectStops(activity) {
    var stops = [{ kind: 'intro', id: INTRO_ID }];
    (activity.sections || []).forEach(function (section) {
      (section.type === 'fields' ? (section.fields || []) : []).forEach(function (field) {
        stops.push({ kind: 'field', id: field.id, item: field, section: section });
      });
      (section.type === 'ordered_points' ? (section.prompts || []) : []).forEach(function (prompt) {
        stops.push({ kind: 'prompt', id: prompt.id, item: prompt, section: section });
      });
    });
    stops.push({ kind: 'review', id: REVIEW_ID });
    return stops;
  }

  function workStops(stops) {
    return stops.filter(function (s) { return s.kind === 'field' || s.kind === 'prompt'; });
  }

  /* ---------- Insight points, derived from the same checks ---------- */

  function stopTag(stop, activity, state) {
    var text = (state.answers[stop.id] || '').trim();
    if (!text) return null;
    if (stop.kind === 'field') {
      return FB.evaluateField(stop.item, text, state.checks, activity).tag;
    }
    return FB.evaluatePoint(stop.item, text, state.checks).tag;
  }

  function tallyPoints(activity, state, cfg) {
    var total = 0;
    workStops(state.stops).forEach(function (stop) {
      if (stopTag(stop, activity, state) === 'Ready') {
        total += stop.kind === 'field' ? cfg.field_ready : cfg.prompt_ready;
      }
    });
    return total;
  }

  function maxPoints(state, cfg) {
    return workStops(state.stops).reduce(function (sum, stop) {
      return sum + (stop.kind === 'field' ? cfg.field_ready : cfg.prompt_ready);
    }, 0);
  }

  /* ---------- HUD + rail refresh ---------- */

  function refreshProgress(activity, state) {
    var cfg = state.missionPoints;
    var pts = tallyPoints(activity, state, cfg);
    state.shell.hud.setPoints(pts);
    if (pts > (state.lastPts || 0) && state.booted) {
      M.toast('Field locked in', pts - (state.lastPts || 0));
    }
    state.lastPts = pts;

    var work = workStops(state.stops);
    var ready = work.filter(function (s) { return stopTag(s, activity, state) === 'Ready'; });
    state.shell.hud.medallion.set(ready.length, work.length);

    work.forEach(function (stop) {
      var tile = state.tileFor[stop.id];
      if (!tile) return;
      var tag = stopTag(stop, activity, state);
      var answered = (state.answers[stop.id] || '').trim();
      tile.className = 'm-tile'
        + (state.currentId === stop.id ? ' m-tile-open' : '')
        + (tag === 'Ready' ? ' m-tile-done'
          : (tag ? ' m-tile-' + tag.toLowerCase() : (answered ? ' m-tile-active' : '')));
      var dot = tile.querySelector('.m-tile-dot');
      dot.textContent = '';
      if (tag === 'Ready') dot.appendChild(C.svgEl(M.GLYPH.check, 'm-tile-check'));
      else dot.appendChild(el('span', null, String(stop.number)));
      tile.querySelector('.m-tile-st').textContent =
        tag === 'Ready' ? 'Locked in  ·  +' + (stop.kind === 'field' ? cfg.field_ready : cfg.prompt_ready) + ' Insight'
          : (tag ? tag : (answered ? 'In progress' : 'Not started'));
    });

    if (state.barFill) {
      var answeredCount = work.filter(function (s) { return (state.answers[s.id] || '').trim(); }).length;
      state.barFill.style.width = (work.length ? Math.round(100 * answeredCount / work.length) : 0) + '%';
      state.barCount.textContent = answeredCount + '/' + work.length + ' answered';
    }
  }

  /* ---------- the Mission Board rail (the journey map) ---------- */

  function buildRail(activity, state, openStop) {
    var rail = el('nav', 'm-rail');
    rail.appendChild(el('h4', 'm-rail-title', 'Mission Board'));
    var number = 0;
    (activity.sections || []).forEach(function (section) {
      var items = section.type === 'fields' ? (section.fields || [])
        : (section.type === 'ordered_points' ? (section.prompts || []) : []);
      if (!items.length) return;
      if ((activity.sections || []).length > 1) {
        rail.appendChild(el('div', 'm-rail-group',
          section.title.replace(/^Part [A-Z]\s*[\u2014-]\s*/, '')));
      }
      items.forEach(function (item) {
        number += 1;
        var stop = state.stops.filter(function (s) { return s.id === item.id; })[0];
        stop.number = number;
        var tile = el('button', 'm-tile');
        tile.type = 'button';
        var dot = el('span', 'm-tile-dot', String(number));
        tile.appendChild(dot);
        var txt = el('span', 'm-tile-txt');
        txt.appendChild(el('span', 'm-tile-nm', item.label));
        txt.appendChild(el('span', 'm-tile-st', 'Not started'));
        tile.appendChild(txt);
        tile.addEventListener('click', function () { openStop(stop.id); });
        state.tileFor[item.id] = tile;
        rail.appendChild(tile);
      });
    });
    var work = workStops(state.stops);
    var report = el('button', 'm-tile m-tile-report');
    report.type = 'button';
    var rdot = el('span', 'm-tile-dot');
    rdot.appendChild(C.svgEl(M.GLYPH.star, null));
    report.appendChild(rdot);
    var rtxt = el('span', 'm-tile-txt');
    rtxt.appendChild(el('span', 'm-tile-nm', 'Mission report'));
    rtxt.appendChild(el('span', 'm-tile-st', 'The review and the export'));
    report.appendChild(rtxt);
    report.addEventListener('click', function () { openStop(REVIEW_ID); });
    rail.appendChild(report);
    rail.appendChild(el('div', 'm-rail-foot',
      'Work through all ' + work.length + ' stops to complete the mission.'));
    return rail;
  }

  /* ---------- the intro scene ---------- */

  function buildIntroScene(activity, state, openStop) {
    var scene = M.buildScene({
      eyebrow: [activity.meta.program, activity.meta.module, activity.meta.lesson]
        .filter(Boolean).join('  ·  '),
      title: activity.meta.title
    });
    scene.node.querySelector('.m-scene-title').classList.add('m-scene-title-big');
    if (activity.intro && activity.intro.headline) {
      scene.body.appendChild(el('p', 'm-lead m-lead-strong', activity.intro.headline));
    }
    if (activity.intro && activity.intro.body) {
      scene.body.appendChild(el('p', 'm-lead', activity.intro.body));
    }

    var say = el('div', 'm-mentor-say');
    say.appendChild(M.mentor(50));
    var sayBody = el('div');
    sayBody.appendChild(el('b', null, 'Wawiwa AI Coach'));
    sayBody.appendChild(el('div', 'm-mentor-text',
      'One stop at a time. Write it in your own words, check it, and I will react to what you wrote.'));
    say.appendChild(sayBody);
    scene.body.appendChild(say);

    if (state.scaffold) {
      var support = el('div', 'm-support-note');
      support.appendChild(el('p', null,
        'Support mode. Each stop shows a worked example from a different case. Read it, then write your own version for your case. Same canvas, same saving, gentler road.'));
      scene.body.appendChild(support);
    }

    var chips = el('div', 'meta-chips title-chips');
    if (activity.meta.estimated_minutes) {
      chips.appendChild(el('span', 'meta-chip', 'About ' + activity.meta.estimated_minutes + ' minutes'));
    }
    chips.appendChild(el('span', 'meta-chip', workStops(state.stops).length + ' stops'));
    chips.appendChild(el('span', 'meta-chip' + (C.liveOn() ? ' meta-chip-live' : ''),
      C.liveOn() ? 'Live coach' : 'Local coach'));
    scene.body.appendChild(chips);

    // the PII rule stays a first-class part of the flow
    var safety = (activity.safety || {}).student_notice;
    if (safety) {
      var box = el('div', 'm-safety');
      var head = el('div', 'm-safety-head');
      head.appendChild(C.svgEl(C.SVG.shield, 'safety-icon'));
      head.appendChild(el('strong', 'm-safety-title', 'Before you start: no personal data.'));
      box.appendChild(head);
      box.appendChild(el('p', 'm-safety-body', safety));
      box.appendChild(el('p', 'm-safety-local', C.liveOn()
        ? 'Your work is saved only in this browser. When you ask the live coach, your answer text is scrubbed of emails, phone numbers, long numbers, and keys, then sent anonymously through Wawiwa’s proxy. Your identity is never sent because it is never collected.'
        : 'Everything you write stays in this browser on this device. This page sends nothing anywhere.'));
      scene.body.appendChild(box);
    }

    var foot = scene.foot();
    foot.appendChild(el('span', 'm-spacer'));
    var started = workStops(state.stops).some(function (s) {
      return (state.answers[s.id] || '').trim();
    });
    var start = el('button', 'btn btn-primary btn-large',
      started ? 'Continue the mission' : 'Start the mission');
    start.type = 'button';
    start.addEventListener('click', function () {
      var work = workStops(state.stops);
      var next = work.filter(function (s) { return !(state.answers[s.id] || '').trim(); })[0] || work[0];
      openStop(next.id);
    });
    foot.appendChild(start);
    return scene.node;
  }

  /* ---------- one field or prompt, as a scene ---------- */

  function buildPromptEditor(state, activity, prompt) {
    // ordered_points editor: same checks and autosave as before, one scene
    var card = el('div', 'field-card');
    card.id = 'card-' + prompt.id;
    var labelWrap = el('div', 'field-label-wrap');
    labelWrap.appendChild(el('h3', 'field-label', prompt.label));
    card.appendChild(labelWrap);
    var ta = el('textarea', 'answer-input answer-short');
    ta.placeholder = 'Points to speak from, not a script.';
    ta.value = state.answers[prompt.id] || '';
    var feedback = el('div', 'feedback');
    var check = function () {
      var result = FB.evaluatePoint(prompt, state.answers[prompt.id], state.checks);
      C.feedbackBlock(feedback, result);
      refreshProgress(activity, state);
      return result;
    };
    ta.addEventListener('input', function () {
      state.answers[prompt.id] = ta.value;
      C.saveAnswers(activity, state.answers);
      refreshProgress(activity, state);
    });
    ta.addEventListener('blur', function () {
      if ((ta.value || '').trim()) check();
    });
    card.appendChild(ta);
    var btnRow = el('div', 'btn-row');
    var btn = el('button', 'btn btn-primary', 'Check this point');
    btn.type = 'button';
    btn.addEventListener('click', check);
    btnRow.appendChild(btn);
    card.appendChild(btnRow);
    card.appendChild(feedback);
    state.checkFns[prompt.id] = check;
    return { card: card, check: check, textarea: ta };
  }

  function buildStopScene(activity, state, stop, openStop) {
    var work = workStops(state.stops);
    var idx = work.indexOf(stop);
    var scene = M.buildScene({
      badge: 'Stop ' + (idx + 1) + ' / ' + work.length,
      eyebrow: stop.section.title.replace(/^Part [A-Z]\s*[\u2014-]\s*/, ''),
      title: stop.item.label,
      className: 'm-scene-wide'
    });

    var grid = el('div', 'm-workgrid');
    scene.body.appendChild(grid);

    var console_ = el('div', 'm-console');
    if (stop.section.instruction) {
      console_.appendChild(el('p', 'm-console-hint', stop.section.instruction));
    }
    var editor;
    if (stop.kind === 'field') {
      editor = state.editors[stop.id] || C.fieldEditor(state, activity, stop.item, {
        onResult: function () { refreshProgress(activity, state); }
      });
      editor.textarea.addEventListener('input', function () {
        refreshProgress(activity, state);
      });
    } else {
      editor = state.editors[stop.id] || buildPromptEditor(state, activity, stop.item);
    }
    state.editors[stop.id] = editor;
    console_.appendChild(editor.card);
    grid.appendChild(console_);

    // the mentor coach column: the per-scene line is the field's own help
    // text; the reactions stay the existing feedback blocks, unchanged
    var coach = M.buildCoachPanel({
      subtitle: 'on this stop',
      line: stop.item.help || stop.section.instruction || 'Write it in your own words, then check it.'
    });
    var cfg = state.missionPoints;
    coach.goal('Mission goal', 'Earn the Ready tag on this stop. Short and concrete beats long and vague.');
    coach.reward('Reward: +' + (stop.kind === 'field' ? cfg.field_ready : cfg.prompt_ready)
      + ' Insight when this stop locks in');
    grid.appendChild(coach.node);

    var foot = scene.foot();
    var prev = el('button', 'btn btn-ghost', 'Back');
    prev.type = 'button';
    if (idx === 0) prev.disabled = true;
    prev.addEventListener('click', function () {
      if (idx > 0) openStop(work[idx - 1].id);
    });
    foot.appendChild(prev);

    var barWrap = el('div', 'm-bar');
    state.barFill = el('i');
    barWrap.appendChild(state.barFill);
    foot.appendChild(barWrap);
    state.barCount = el('span', 'm-bar-count', '');
    foot.appendChild(state.barCount);

    var next = el('button', 'btn btn-primary',
      idx + 1 < work.length ? 'Next stop' : 'Finish the mission');
    next.type = 'button';
    next.addEventListener('click', function () {
      if (idx + 1 < work.length) openStop(work[idx + 1].id);
      else openStop(REVIEW_ID);
    });
    foot.appendChild(next);
    return scene.node;
  }

  /* ---------- the review scene (mechanics unchanged, passback intact) ---------- */

  function buildReviewScene(activity, state, openStop) {
    var scene = M.buildScene({
      badge: 'Mission report',
      eyebrow: 'The last stop',
      title: 'Review my work',
      className: 'm-scene-wide'
    });
    scene.body.appendChild(el('p', 'm-lead',
      'A rule-based review against the rubric. It checks structure, not meaning: a green tag says the bones are in place.'));

    var btn = el('button', 'btn btn-teal btn-large', 'Run the full review');
    btn.type = 'button';
    var out = el('div', 'review-out');
    var coachOut = C.liveOn() ? el('div', 'feedback') : null;

    btn.addEventListener('click', function () {
      out.textContent = '';
      var evalResult = FB.evaluateActivity(activity, state.checks, state.answers);
      state.lastEval = evalResult; // the designed export shows the result too
      Object.keys(state.checkFns).forEach(function (id) { state.checkFns[id](); });
      refreshProgress(activity, state);

      out.appendChild(C.levelBanner(evalResult));
      evalResult.notes.forEach(function (n) {
        out.appendChild(el('div', 'review-note', n));
      });
      out.appendChild(C.rubricBox(evalResult));

      if (evalResult.overall.fixes.length) {
        var fixBox = el('div', 'fix-box');
        fixBox.appendChild(el('h3', 'panel-subtitle', 'Start here'));
        evalResult.overall.fixes.forEach(function (f) {
          var row = el('div', 'fix-row');
          var link = el('button', 'fix-link m-fix-link', f.label);
          link.type = 'button';
          link.addEventListener('click', function () { openStop(f.fieldId); });
          row.appendChild(link);
          if (f.message) row.appendChild(el('span', 'fix-why', ' ' + f.message));
          fixBox.appendChild(row);
        });
        out.appendChild(fixBox);
      }
      out.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    var btnRow = el('div', 'btn-row');
    btnRow.appendChild(btn);
    if (coachOut) {
      btnRow.appendChild(C.coachButton(state, 'Ask the coach for a full review', function (b) {
        b.disabled = true;
        C.coachThinking(coachOut);

      var items = section.type === 'fields' ? (section.fields || [])
        : (section.type === 'ordered_points' ? (section.prompts || []) : []);
      if (!items.length) return;
      var cards = items.map(function (item, i) {
        var stop = state.stops.filter(function (s) { return s.id === item.id; })[0];

          title: item.label,

    function heightToNormal(heightCanvas, strength) {
      var w = heightCanvas.width >> 1, hh = heightCanvas.height >> 1;
      var small = document.createElement('canvas');
      small.width = w; small.height = hh;
      var sc = small.getContext('2d');
      sc.drawImage(heightCanvas, 0, 0, w, hh);
      var src = sc.getImageData(0, 0, w, hh).data;
      var out = sc.createImageData(w, hh);
      var d = out.data;
      function hAt(x, y) {
        x = Math.max(0, Math.min(w - 1, x)); y = Math.max(0, Math.min(hh - 1, y));
        return src[(y * w + x) * 4] / 255;
      }
      for (var y = 0; y < hh; y++) {
        for (var x = 0; x < w; x++) {
          var dx = (hAt(x - 1, y) - hAt(x + 1, y)) * strength;
          var dy = (hAt(x, y - 1) - hAt(x, y + 1)) * strength;
          var inv = 1 / Math.sqrt(dx * dx + dy * dy + 1);
          var o = (y * w + x) * 4;
          d[o] = (dx * inv * 0.5 + 0.5) * 255;
          d[o + 1] = (dy * inv * 0.5 + 0.5) * 255;
          d[o + 2] = inv * 255;
          d[o + 3] = 255;
        }
      }
      sc.putImageData(out, 0, 0);
      return small;
    }

    // cfg (optional): { seed, icons: [names], accentCss } — per-room theming
    // rides the same generator: a different icon set, a different accent
    // block color, a different deterministic layout. Not a new engine.
    function makeMural(res, cfg) {
      cfg = cfg || {};
      var W = res, H = res >> 1;
      var seed = cfg.seed || 7;
      var iconPool = cfg.icons || ICON_NAMES;
      function rnd() { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; }
      var art = document.createElement('canvas'); art.width = W; art.height = H;
      var hgt = document.createElement('canvas'); hgt.width = W; hgt.height = H;
      var rgh = document.createElement('canvas'); rgh.width = W; rgh.height = H;
      var a = art.getContext('2d'), h = hgt.getContext('2d'), r = rgh.getContext('2d');
      a.fillStyle = '#0A1E30'; a.fillRect(0, 0, W, H);       // seam color
      h.fillStyle = '#5A5A5A'; h.fillRect(0, 0, W, H);       // seams sit low
      r.fillStyle = '#B4B4B4'; r.fillRect(0, 0, W, H);
      // palette: mostly teal family and navy; red and white deliberate accents
      var palette = [
        { fill: '#0097A7', rough: 70, icon: '#FFFFFF' },
        { fill: '#007681', rough: 80, icon: '#FFFFFF' },
        { fill: '#0C2233', rough: 185, icon: '#FFFFFF' },
        { fill: '#2FC3D4', rough: 60, icon: '#FFFFFF' },
        { fill: '#123A52', rough: 170, icon: '#9FD6DC' },
        { fill: cfg.accentCss || '#EE3124', rough: 65, icon: '#FFFFFF' },
        { fill: '#F5F7F8', rough: 120, icon: '#0C2233' }
      ];
      var weights = [3, 2, 4, 1.5, 3, 1.4, 0.8];
      function pick() {
        var total = 0, i;
        for (i = 0; i < weights.length; i++) total += weights[i];
        var v = rnd() * total;
        for (i = 0; i < weights.length; i++) { v -= weights[i]; if (v <= 0) return palette[i]; }
        return palette[0];
      }
      // irregular grid: 6 columns x 3 rows, cells randomly merged vertically
      var colsN = 6, rowsN = 3, gutter = Math.max(6, W / 340);
      var colW = W / colsN, rowH = H / rowsN;
      var taken = {};
      for (var cx = 0; cx < colsN; cx++) {
        for (var cy = 0; cy < rowsN; cy++) {
          if (taken[cx + ':' + cy]) continue;
          var spanY = (cy < rowsN - 1 && rnd() < 0.35) ? 2 : 1;
          if (spanY === 2) taken[cx + ':' + (cy + 1)] = true;
          var p = pick();
          var bx = cx * colW + gutter, by = cy * rowH + gutter;
          var bw = colW - gutter * 2, bh = rowH * spanY - gutter * 2;
          a.fillStyle = p.fill; a.fillRect(bx, by, bw, bh);
          h.fillStyle = '#8C8C8C'; h.fillRect(bx, by, bw, bh);  // panels sit proud
          r.fillStyle = 'rgb(' + p.rough + ',' + p.rough + ',' + p.rough + ')';
          r.fillRect(bx, by, bw, bh);
          if (bw > 40 && rnd() < 0.85) {
            // one clean line icon per block, centered, sized to fit
            var iconFn = ICONS[iconPool[Math.floor(rnd() * iconPool.length)]] || ICONS.gear;
            var s = Math.min(bw, bh) * (0.55 + rnd() * 0.25);
            var ix = bx + (bw - s) / 2, iy = by + (bh - s) / 2;
            [[a, p.icon], [h, '#B4B4B4'], [r, '#505050']].forEach(function (spec) {
              var c = spec[0];
              c.save();
              c.translate(ix, iy); c.scale(s, s);
              c.strokeStyle = spec[1]; c.fillStyle = spec[1];
              c.lineWidth = 2.6 / s * (W / 512);
              c.lineCap = 'round'; c.lineJoin = 'round';
              iconFn(c);
              c.restore();
            });
          }
        }
      }
      var map = new THREE.CanvasTexture(art);
      map.encoding = THREE.sRGBEncoding;
      map.anisotropy = MAX_ANISO;
      var normalMap = new THREE.CanvasTexture(heightToNormal(hgt, 2.4));
      normalMap.anisotropy = MAX_ANISO;
      var roughnessMap = new THREE.CanvasTexture(rgh);
      roughnessMap.anisotropy = MAX_ANISO;
      return new THREE.MeshStandardMaterial({
        map: map, normalMap: normalMap, roughnessMap: roughnessMap,
        normalScale: new THREE.Vector2(0.9, 0.9),
        roughness: 1, metalness: 0.05, envMapIntensity: 0.9
