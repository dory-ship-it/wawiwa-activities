          sheet.castShadow = false;
        });
        // the burn-down: amber bars stepping DOWN along the back wall
        for (var b = 0; b < 5; b++) {
          addBox(group, 0.3, 1.5 - b * 0.28, 0.14, b < 4 ? acc.glow : MAT.red,
            -3.9 + b * 0.5, 0.75 - b * 0.14, cz - ROOM_D / 2 + 0.35).castShadow = false;
        }
        // a stack of spent coins by the table leg
        for (var cn = 0; cn < 4; cn++) {
          var coin = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.16, 0.045, 16),
            cn === 3 ? MAT.red : acc.solid);
          coin.position.set(1.5 + (cn % 2) * 0.1, 0.03 + cn * 0.05, cz - 1.5);
          coin.castShadow = true;
          group.add(coin);
        }
      } else if (theme === 'failure') {
        // the day it breaks: alarm beacons, a tipped rack, a caution strip
        [[-1, cz + 1.0], [1, cz - 2.2]].forEach(function (spec) {
          var post = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.09, 1.9, 10), MAT.pedestal);
          post.position.set(spec[0] * (ROOM_W / 2 - 0.75), 0.95, spec[1]);
          post.castShadow = true;
          group.add(post);
          var beacon = new THREE.Mesh(new THREE.SphereGeometry(0.14, 14, 10), glow(0xFF5A3C, 2.6));
          beacon.position.set(spec[0] * (ROOM_W / 2 - 0.75), 2.0, spec[1]);
          beacon.userData.beacon = true; // flickers for a beat on entry
          group.add(beacon);
        });
        // the rack that went down, leaning into the corner
        var fallen = addRounded(group, 1.0, 2.3, 0.5, 0.05, 2, MAT.pedestal, 3.7, 1.0, cz - 2.9);
        fallen.rotation.z = -0.38;
        for (var f = 0; f < 3; f++) {
          var slot = addBox(group, 0.8, 0.07, 0.1, glow(0xFF5A3C, 1.8), 3.45 + f * 0.14, 0.55 + f * 0.6, cz - 2.62);
          slot.rotation.z = -0.38;
          slot.castShadow = false;
        }
        // caution strip across the exit threshold
        for (var cs = 0; cs < 6; cs++) {
          addBox(group, 0.42, 0.025, 0.5, cs % 2 ? MAT.pedestal : glow(0xE8A33D, 1.2),
            -1.05 + cs * 0.42, 0.045, cz - ROOM_D / 2 + 0.65).castShadow = false;
        }
        fallen.userData.themed = true;
      } else if (theme === 'metric') {
        // prove it worked: a big gauge on a stand + a rising bar chart + a flag
        var stand = addRounded(group, 0.5, 1.15, 0.4, 0.06, 2, MAT.pedestal, 3.3, 0.57, cz - 2.7);
        var dial = new THREE.Mesh(new THREE.TorusGeometry(0.62, 0.07, 10, 40), acc.glow);
        dial.position.set(3.3, 1.9, cz - 2.7);
        group.add(dial);
        var needle = addBox(group, 0.05, 0.5, 0.05, MAT.red, 3.42, 2.1, cz - 2.7);
        needle.rotation.z = -0.7;
        var hub = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 10), MAT.trim);
        hub.position.set(3.3, 1.9, cz - 2.7);
        group.add(hub);
        // baseline → target: four bars stepping UP along the left-front
        for (var m = 0; m < 4; m++) {
          addBox(group, 0.34, 0.4 + m * 0.34, 0.34, m === 3 ? acc.glow : acc.solid,
            -3.8 + m * 0.55, 0.2 + m * 0.17, cz - 2.9);
        }
        var pole = addBox(group, 0.04, 0.7, 0.04, MAT.trim, -2.15 + 0.13, 1.95, cz - 2.9);
        var flagFace = addBox(group, 0.34, 0.2, 0.02, MAT.red, -2.0, 2.15, cz - 2.9);
        flagFace.castShadow = false;
        stand.userData.themed = true;
      }
    }

    // Everything one station needs, built from the scene spec alone.
    function buildRoom(scene, index) {
      var cz = roomZ(index);
      var group = new THREE.Group();
      group.name = 'room-' + scene.id;
      var themeName = ROOM_THEMES[scene.id] || 'default';
      var th = THEMES[themeName] || {};
      var acc = themeAccent(themeName);
      var muralMat = themeMuralMaterial(themeName);

      var slab = addBox(group, ROOM_W, 0.3, ROOM_D, MAT.floor, 0, -0.15, cz); // floor slab
      slab.castShadow = false; // nothing lives below the floor
      addBox(group, ROOM_W - 2.4, 0.06, ROOM_D - 2.4, MAT.floorLight, 0, 0.031, cz).castShadow = false; // inner rug
      // side walls
      addBox(group, 0.3, WALL_H, ROOM_D, MAT.wall, -ROOM_W / 2, WALL_H / 2, cz);
      addBox(group, 0.3, WALL_H, ROOM_D, MAT.wall, ROOM_W / 2, WALL_H / 2, cz);
      // back wall with a doorway gap (the exit toward the next station)
      var side = (ROOM_W - 2.4) / 2;
      addBox(group, side, WALL_H, 0.3, MAT.wall, -(1.2 + side / 2), WALL_H / 2, cz - ROOM_D / 2);
      addBox(group, side, WALL_H, 0.3, MAT.wall, (1.2 + side / 2), WALL_H / 2, cz - ROOM_D / 2);
      addBox(group, 2.4, 0.9, 0.3, MAT.wall, 0, WALL_H - 0.45, cz - ROOM_D / 2);   // lintel
      // front wall pieces (entrance gap)
      addBox(group, side, WALL_H, 0.3, MAT.wall, -(1.2 + side / 2), WALL_H / 2, cz + ROOM_D / 2);
      addBox(group, side, WALL_H, 0.3, MAT.wall, (1.2 + side / 2), WALL_H / 2, cz + ROOM_D / 2);
      addBox(group, 2.4, 0.9, 0.3, MAT.wall, 0, WALL_H - 0.45, cz + ROOM_D / 2);
      // corner columns (rounded) + accent trim line, in the room's theme color
      [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(function (c) {
        addRounded(group, 0.42, WALL_H + 0.35, 0.42, 0.09, 2, acc.solid,
          c[0] * (ROOM_W / 2 - 0.2), (WALL_H + 0.35) / 2, cz + c[1] * (ROOM_D / 2 - 0.2));
      });
      // door portals: rounded metal jambs + lintel trim + a glow inlay,
      // on both the entrance and the exit plane
      [cz - ROOM_D / 2, cz + ROOM_D / 2].forEach(function (zc) {
        [-1.31, 1.31].forEach(function (jx) {
          addRounded(group, 0.2, 2.5, 0.52, 0.06, 2, MAT.trim, jx, 1.25, zc);
        });
        addRounded(group, 2.86, 0.2, 0.52, 0.06, 2, MAT.trim, 0, 2.6, zc);
        addBox(group, 2.42, 0.05, 0.1, MAT.glowSoft, 0, 2.48, zc).castShadow = false;
      });
      addBox(group, ROOM_W, 0.1, 0.12, acc.glow, 0, 2.9, cz - ROOM_D / 2 + 0.18).castShadow = false;

      // the vivid poster mural (this room's icon set + accent): full right
      // wall, plus two panels flanking the exit door the player faces
      var muralMain = muralPanel(muralMat, ROOM_D - 0.7, 2.7, 0, 0, 1, 1);
      muralMain.position.set(ROOM_W / 2 - 0.17, 1.62, cz);
      muralMain.rotation.y = -Math.PI / 2;
      group.add(muralMain);
      var muralL = muralPanel(muralMat, side - 0.5, 2.5, 0.02, 0.06, 0.3, 0.94);
      muralL.position.set(-(1.2 + side / 2), 1.52, cz - ROOM_D / 2 + 0.17);
      group.add(muralL);
      var muralR = muralPanel(muralMat, side - 0.5, 2.5, 0.68, 0.06, 0.96, 0.94);
      muralR.position.set(1.2 + side / 2, 1.52, cz - ROOM_D / 2 + 0.17);
      group.add(muralR);

      // ceiling light ring in the theme glow
      var ring = new THREE.Mesh(new THREE.TorusGeometry(1.6, 0.07, 10, 48), acc.glow);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(0, WALL_H - 0.3, cz);
      group.add(ring);
      // the room's accent light: theme-tinted, physically-correct, drifting
      // to the consequence tag color (and brightening) on the reveal
      var light = new THREE.PointLight(th.light || 0xEAF6F8, 26, 17, 2);
      light.position.set(0, WALL_H - 0.7, cz);
      group.add(light);

      // the floating situation panel, above the exit door
      var panelTex = trackTexture(canvasTexture(1024, 640, function (ctx, cv) {
        drawSituation(ctx, cv, scene);
      }));
      var panel = new THREE.Mesh(
        new THREE.PlaneGeometry(4.4, 2.75),
        new THREE.MeshBasicMaterial({ map: panelTex.texture, transparent: false }));
      panel.position.set(0, 2.62, cz - ROOM_D / 2 + 0.5);
      panel.rotation.x = -0.1; // a slight bow toward the player
      group.add(panel);

      // the consequence wall screen (left wall)
      var screenTex = trackTexture(canvasTexture(1024, 560, drawScreenIdle));
      var screen = new THREE.Mesh(
        new THREE.PlaneGeometry(3.9, 2.13),
        new THREE.MeshBasicMaterial({ map: screenTex.texture }));
      screen.position.set(-ROOM_W / 2 + 0.32, 1.9, cz - 0.6);
      screen.rotation.y = Math.PI / 2;
      group.add(screen);

      // choice cards on pedestals, an arc facing the entrance
      var letters = ['A', 'B', 'C', 'D'];
      var options = scene.decision.options || [];
      var cards = options.map(function (option, i) {
        var n = options.length;
        var cx = (i - (n - 1) / 2) * 2.6;
        var cardZ = cz - 1.7 - Math.abs(i - (n - 1) / 2) * 0.35;
        addRounded(group, 0.55, 0.85, 0.55, 0.07, 2, MAT.pedestal, cx, 0.42, cardZ);
        addBox(group, 0.61, 0.05, 0.61, MAT.trim, cx, 0.055, cardZ); // metal base plinth
        var tex = trackTexture(canvasTexture(512, 320, function (ctx, cv) {
          drawCard(ctx, cv, letters[i] || '•', option.label,
            state.answers[FB.decisionKey(scene)] === option.id ? 'committed' : 'idle');
        }));
        var card = new THREE.Mesh(
          roundedBoxGeometry(1.8, 1.12, 0.09, 0.04, 2),
          [MAT.pedestal, MAT.pedestal, MAT.pedestal, MAT.pedestal,
            new THREE.MeshBasicMaterial({ map: tex.texture }), MAT.pedestal]);
        card.position.set(cx, 1.5, cardZ);
        card.rotation.x = -0.06;
        card.userData = { kind: 'card', sceneId: scene.id, optionId: option.id, baseY: 1.5, idx: i };
        group.add(card);
        return { mesh: card, option: option, tex: tex };
      });

      // the glowing station waypoint: walk (or click) here to decide
      var way = new THREE.Mesh(new THREE.TorusGeometry(0.62, 0.06, 10, 44), MAT.glowTeal.clone());
      way.rotation.x = Math.PI / 2;
      way.position.set(0, 0.06, cz + 1.6);
      way.userData = { kind: 'waypoint', targetZ: cz + 1.6, sceneId: scene.id };
      group.add(way);

      dressRoom(group, themeName, cz);

      world.add(group);
      track(group);

      return {
        scene: scene, index: index, cz: cz, group: group, light: light,
        theme: themeName, baseLightHex: th.light || 0xEAF6F8,
        panelTex: panelTex, screenTex: screenTex, cards: cards, waypoint: way,
        entered: false, decided: !!state.answers[FB.decisionKey(scene)],
        lightTargetHex: null
      };
    }

    // the corridor segment that connects room (index-1) → room (index).
    // A weak choice that routes into a detour scene travels a DIFFERENT
    // passage: narrower, dimmer, lower, amber-lit — "your path" made
    // physical. The corridor OUT of a detour is the standard bright teal
    // hall again, so rejoining the main line is unmistakable.
    var CORRIDOR_SEGS = []; // {z0, z1, width} for the walkable-width clamp
    function buildCorridor(index, detour) {
      var group = new THREE.Group();
      var z0 = roomZ(index - 1) - ROOM_D / 2, z1 = roomZ(index) + ROOM_D / 2;
      var mid = (z0 + z1) / 2, len = z0 - z1;
      var width = detour ? 2.3 : CORRIDOR_W;
      CORRIDOR_SEGS.push({ z0: z0, z1: z1, width: width });
      var wallH = detour ? 2.15 : 2.5;
      var wallM = detour ? mat(0x0A1C2A, { roughness: 0.9 }) : MAT.wall;
      addBox(group, width, 0.3, len, MAT.floor, 0, -0.15, mid);
      addBox(group, 0.24, wallH, len, wallM, -width / 2, wallH / 2, mid);
      addBox(group, 0.24, wallH, len, wallM, width / 2, wallH / 2, mid);
      if (detour) {
        // a low ceiling closes the duct; amber guides replace the teal dots
        addBox(group, width + 0.24, 0.14, len, wallM, 0, wallH + 0.07, mid).castShadow = false;
        var amber = glow(0xFFA028, 2.3);
        for (var i = 0; i < 5; i++) {
          var gz = z0 - (len * (i + 0.5)) / 5;
          addBox(group, 0.08, 0.3, 0.05, amber, -width / 2 + 0.14, 1.1, gz).castShadow = false;
          addBox(group, 0.08, 0.3, 0.05, amber, width / 2 - 0.14, 1.1, gz).castShadow = false;
        }
        // the warning arch where the main hall hands over to the detour
        addRounded(group, width + 0.5, 0.24, 0.4, 0.06, 2, mat(0x8A5A18, { roughness: 0.5, metalness: 0.4 }),
          0, wallH + 0.28, z0 - 0.3);
      } else {
        for (var j = 1; j < 4; j++) {
          var gz2 = z0 - (len * j) / 4;
          addBox(group, 0.1, 0.04, 0.34, MAT.glowSoft, -width / 2 + 0.22, 0.02, gz2).castShadow = false;
          addBox(group, 0.1, 0.04, 0.34, MAT.glowSoft, width / 2 - 0.22, 0.02, gz2).castShadow = false;
        }
      }
      world.add(group);
      track(group);
      return group;
    }

    /* =========================== the recap room =========================== */

    // marker plaque: step number, scene title, tag color band
    function drawMarker(ctx, cv, num, title, tag) {
      var W = cv.width, H = cv.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#F5F7F8';
      rr(ctx, 0, 0, W, H, 18); ctx.fill();
      ctx.fillStyle = TAG_CSS[tag] || '#5AB3AA';
      rr(ctx, 0, 0, W, 34, 12); ctx.fill();
      ctx.fillRect(0, 20, W, 14);
      ctx.fillStyle = '#0097A7';
      ctx.beginPath(); ctx.arc(38, 92, 24, 0, 6.284); ctx.fill();
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '800 30px ' + FONTS;
      ctx.textAlign = 'center';
      ctx.fillText(String(num), 38, 103);
      ctx.textAlign = 'left';
      ctx.fillStyle = '#1F2C36';
      ctx.font = '700 21px ' + FONTS;
      wrapLines(ctx, title, W - 92).slice(0, 3).forEach(function (line, i) {
        ctx.fillText(line, 74, 78 + i * 27);
      });
    }

    // the finale wall panel: overall level + rubric verdicts (pure
    // presentation of evaluateActivity data; passback still fires only
    // through the shared levelBanner in the overlay, untouched)
    function drawRecapPanel(ctx, cv, evalResult) {
      var W = cv.width, H = cv.height;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0C2233';
      rr(ctx, 0, 0, W, H, 34); ctx.fill();
      ctx.strokeStyle = 'rgba(47,195,212,0.55)'; ctx.lineWidth = 5;
      rr(ctx, 4, 4, W - 8, H - 8, 30); ctx.stroke();
      ctx.fillStyle = '#EE3124';
      rr(ctx, 44, 44, 118, 12, 6); ctx.fill();
      ctx.fillStyle = '#2FC3D4';
      ctx.font = '800 32px ' + FONTS;
      ctx.fillText('THE RECAP', 44, 106);
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '800 56px ' + FONTS;
      ctx.fillText('Where your path led', 44, 168);
      var lvlColor = [TAG_CSS.Ready, TAG_CSS.Light, TAG_CSS.Revise][evalResult.overall.levelIndex] || '#5AB3AA';
      ctx.fillStyle = lvlColor;
      rr(ctx, 44, 196, 26, 26, 7); ctx.fill();
      ctx.font = '700 34px ' + FONTS;
      ctx.fillText(evalResult.overall.level, 86, 220);
      ctx.fillStyle = 'rgba(159,214,220,0.4)';
      ctx.fillRect(44, 248, W - 88, 3);
      var y = 300;
      evalResult.rubric.slice(0, 5).forEach(function (r) {
        ctx.fillStyle = TAG_CSS[r.tag] || '#5AB3AA';
        ctx.beginPath(); ctx.arc(56, y - 9, 10, 0, 6.284); ctx.fill();
        ctx.fillStyle = '#EAF4F6';
        ctx.font = '700 27px ' + FONTS;
        ctx.fillText(r.name, 80, y);
        ctx.fillStyle = '#9FBAC6';
        ctx.font = '500 23px ' + FONTS;
        var verdict = wrapLines(ctx, r.verdict, W - 130)[0] || '';
        ctx.fillText(verdict, 80, y + 30);
        y += 68;
      });
    }

    var recapRoom = null;
    var RECAP_W = 13, RECAP_D = 11;

    function buildRecapRoom() {
      if (recapRoom) return recapRoom;
      var index = builtRooms.length;
      buildCorridor(index, false); // the bright main hall carries you home
      var cz = roomZ(index);
      var group = new THREE.Group();
      group.name = 'room-recap';
      var acc = themeAccent('recap');
      var muralMat = themeMuralMaterial('recap');

      var slab = addBox(group, RECAP_W, 0.3, RECAP_D, MAT.floor, 0, -0.15, cz);
      slab.castShadow = false;
      addBox(group, RECAP_W - 2.4, 0.06, RECAP_D - 2.4, MAT.floorLight, 0, 0.031, cz).castShadow = false;
      // side walls + solid back wall (the journey ends here)
      addBox(group, 0.3, WALL_H, RECAP_D, MAT.wall, -RECAP_W / 2, WALL_H / 2, cz);
      addBox(group, 0.3, WALL_H, RECAP_D, MAT.wall, RECAP_W / 2, WALL_H / 2, cz);
      addBox(group, RECAP_W, WALL_H, 0.3, MAT.wall, 0, WALL_H / 2, cz - RECAP_D / 2);
      // entrance wall with the door gap
      var side2 = (RECAP_W - 2.4) / 2;
      addBox(group, side2, WALL_H, 0.3, MAT.wall, -(1.2 + side2 / 2), WALL_H / 2, cz + RECAP_D / 2);
      addBox(group, side2, WALL_H, 0.3, MAT.wall, (1.2 + side2 / 2), WALL_H / 2, cz + RECAP_D / 2);
      addBox(group, 2.4, 0.9, 0.3, MAT.wall, 0, WALL_H - 0.45, cz + RECAP_D / 2);
      [-1.31, 1.31].forEach(function (jx) {
        addRounded(group, 0.2, 2.5, 0.52, 0.06, 2, MAT.trim, jx, 1.25, cz + RECAP_D / 2);
      });
      addRounded(group, 2.86, 0.2, 0.52, 0.06, 2, MAT.trim, 0, 2.6, cz + RECAP_D / 2);
      addBox(group, 2.42, 0.05, 0.1, MAT.glowSoft, 0, 2.48, cz + RECAP_D / 2).castShadow = false;
      [[-1, -1], [1, -1], [-1, 1], [1, 1]].forEach(function (c) {
        addRounded(group, 0.42, WALL_H + 0.35, 0.42, 0.09, 2, acc.solid,
          c[0] * (RECAP_W / 2 - 0.2), (WALL_H + 0.35) / 2, cz + c[1] * (RECAP_D / 2 - 0.2));
      });
      // murals on BOTH side walls: the whole poster language, one last time
      var muL = muralPanel(muralMat, RECAP_D - 0.7, 2.7, 0, 0, 1, 1);
      muL.position.set(-RECAP_W / 2 + 0.17, 1.62, cz);
      muL.rotation.y = Math.PI / 2;
      group.add(muL);
      var muR = muralPanel(muralMat, RECAP_D - 0.7, 2.7, 0, 0, 1, 1);
      muR.position.set(RECAP_W / 2 - 0.17, 1.62, cz);
      muR.rotation.y = -Math.PI / 2;
      group.add(muR);
      // big ceiling ring + light
      var ring = new THREE.Mesh(new THREE.TorusGeometry(2.4, 0.08, 10, 56), acc.glow);
      ring.rotation.x = Math.PI / 2;
      ring.position.set(0, WALL_H - 0.25, cz);
      group.add(ring);
      var light = new THREE.PointLight(0xEAF6F8, 34, 20, 2);
      light.position.set(0, WALL_H - 0.7, cz);
      group.add(light);

      // ----- "your path", walkable: one marker per traveled scene, a lit
      // route running beneath them, each banded in its decision's tag -----
      var path = state.answers[PATH_KEY] || [];
      var n = path.length;
      path.forEach(function (sceneId, i) {
        var scene = sceneById(activity, sceneId);
        if (!scene) return;
        var d = FB.evaluateDecision(scene, state.answers[FB.decisionKey(scene)], activity, state.checks);
        var mx = (i - (n - 1) / 2) * 1.55;
        var mz = cz + 1.1 - Math.abs(i - (n - 1) / 2) * 0.22; // gentle arc
        addRounded(group, 0.5, 0.95, 0.4, 0.06, 2, MAT.pedestal, mx, 0.47, mz);
        var tagRing = new THREE.Mesh(new THREE.TorusGeometry(0.4, 0.045, 8, 30),
          glow(TAG_HEX[d.tag] || COL.tealBright, 1.8));
        tagRing.rotation.x = Math.PI / 2;
        tagRing.position.set(mx, 0.05, mz);
        group.add(tagRing);
        var plaqueTex = trackTexture(canvasTexture(256, 160, function (ctx, cv) {
          drawMarker(ctx, cv, i + 1, scene.title, d.tag);
        }));
        var plaque = new THREE.Mesh(new THREE.PlaneGeometry(0.95, 0.6),
          new THREE.MeshBasicMaterial({ map: plaqueTex.texture }));
        plaque.position.set(mx, 1.3, mz + 0.21);
        plaque.rotation.x = -0.12;
        plaque.rotation.y = -mx * 0.06; // angled gently toward the center
        group.add(plaque);
        // the lit route: a glow strip linking this marker to the next
        if (i < n - 1) {
          var nx = ((i + 1) - (n - 1) / 2) * 1.55;
          var seg = addBox(group, 1.15, 0.03, 0.12, acc.glow, (mx + nx) / 2, 0.035, mz);
          seg.castShadow = false;
        }
      });

      // ----- the rubric summary, in-world on the back wall -----
      var evalResult = FB.evaluateActivity(activity, state.checks, state.answers);
      var panelTex = trackTexture(canvasTexture(1024, 640, function (ctx, cv) {
        drawRecapPanel(ctx, cv, evalResult);
      }));
      var panel = new THREE.Mesh(new THREE.PlaneGeometry(5.4, 3.38),
        new THREE.MeshBasicMaterial({ map: panelTex.texture }));
      panel.position.set(0, 2.0, cz - RECAP_D / 2 + 0.2);
      group.add(panel);

      // ----- the trophy: a Wawiwa medallion on a stepped podium -----
      addRounded(group, 1.5, 0.35, 1.5, 0.07, 2, MAT.pedestal, 0, 0.17, cz - 2.4);
      addRounded(group, 1.0, 0.4, 1.0, 0.06, 2, acc.solid, 0, 0.55, cz - 2.4);
      var stem = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.13, 0.9, 14), MAT.trim);
      stem.position.set(0, 1.2, cz - 2.4);
      stem.castShadow = true;
      group.add(stem);
      var medal = new THREE.Group();
      medal.position.set(0, 2.05, cz - 2.4);
      var rim = new THREE.Mesh(new THREE.TorusGeometry(0.52, 0.09, 12, 44), MAT.trim);
      medal.add(rim);
      var faceTex = trackTexture(canvasTexture(256, 256, function (ctx, cv) {
        ctx.clearRect(0, 0, 256, 256);
        ctx.fillStyle = '#EE3124';
        ctx.beginPath(); ctx.arc(128, 128, 122, 0, 6.284); ctx.fill();
        ctx.fillStyle = '#FFFFFF';
        ctx.font = '800 52px Roboto, ' + FONTS;
        ctx.textAlign = 'center';
        ctx.fillText('wawiwa', 128, 118);
        ctx.font = '700 30px ' + FONTS;
        ctx.fillText('M1', 128, 172);
        ctx.textAlign = 'left';
      }));
      var disk = new THREE.Mesh(new THREE.CylinderGeometry(0.46, 0.46, 0.07, 36),
        [MAT.red, new THREE.MeshBasicMaterial({ map: faceTex.texture }), MAT.red]);
      disk.rotation.x = Math.PI / 2;
      medal.add(disk);
      var haloRing = new THREE.Mesh(new THREE.TorusGeometry(0.68, 0.035, 8, 44), acc.glowStrong);
      medal.add(haloRing);
      medal.userData.spin = true;
      group.add(medal);
      var spot = new THREE.Mesh(new THREE.TorusGeometry(1.05, 0.05, 8, 40), acc.glow);
      spot.rotation.x = Math.PI / 2;
      spot.position.set(0, 0.04, cz - 2.4);
      group.add(spot);

      world.add(group);
      track(group);
      recapRoom = {
        group: group, cz: cz, light: light, entered: false, celebrated: false,
        confetti: null
      };
      return recapRoom;
    }

    /* ----- the celebration: Wawi's big moment + soft confetti -----
       Gated by tier (High 90 pieces, Medium 45, Low none) and fully off
       under prefers-reduced-motion (a plain arrival instead). */
    function spawnConfetti() {
      var count = quality.tier === 'high' ? 90 : quality.tier === 'medium' ? 45 : 0;
      if (!count || reducedMotion || !recapRoom) return;
      var geo = new THREE.PlaneGeometry(0.07, 0.13);
      var mats = [0x2FC3D4, 0xEE3124, 0xF5F7F8, 0x0097A7].map(function (hex) {
        return new THREE.MeshBasicMaterial({ color: hex, side: THREE.DoubleSide });
      });
      var pieces = [];
      for (var i = 0; i < count; i++) {
        var m = new THREE.Mesh(geo, mats[i % mats.length]);
        var a = (i / count) * Math.PI * 2;
        var rad = 0.4 + (i % 5) * 0.45;
        m.position.set(Math.sin(a) * rad, 3.6 + (i % 7) * 0.35, recapRoom.cz - 2.4 + Math.cos(a) * rad * 0.7);
        m.rotation.set(i * 0.7, i * 1.3, i * 0.4);
        m.userData.vy = 0.55 + (i % 4) * 0.18;
        m.userData.vx = Math.sin(a) * 0.14;
        m.userData.spinA = 2 + (i % 3);
        recapRoom.group.add(m);
        pieces.push(m);
      }
      recapRoom.confetti = { pieces: pieces, mats: mats, geo: geo, done: false };
    }

    function updateRecap(dt, t) {
      if (!recapRoom) return;
      // arrival at the podium: the celebration beat, once
      if (!recapRoom.entered
          && Math.abs(player.z - (recapRoom.cz + 1.6)) < 2.6 && Math.abs(player.x) < 3.4) {
        recapRoom.entered = true;
        refreshCounter();
        arriveAtRecap(true);
      }
      // the medallion slowly turns; confetti falls and settles
      recapRoom.group.children.forEach(function (node) {
        if (node.userData.spin && !reducedMotion) node.rotation.y += dt * 0.7;
      });
      var cf = recapRoom.confetti;
      if (cf && !cf.done) {
        var alive = 0;
        cf.pieces.forEach(function (p) {
          if (!p.visible) return;
          p.position.y -= p.userData.vy * dt;
          p.position.x += p.userData.vx * dt;
          p.rotation.x += p.userData.spinA * dt;
          p.rotation.z += p.userData.spinA * 0.7 * dt;
          if (p.position.y < 0.03) p.visible = false;
          else alive++;
        });
        if (alive) requestRender(0.12);
        else {
          cf.done = true;
          cf.pieces.forEach(function (p) { recapRoom.group.remove(p); });
          cf.geo.dispose();
          cf.mats.forEach(function (m) { m.dispose(); });
          recapRoom.confetti = null;
        }
      }
    }

    // celebrate=true on a fresh arrival; false when resuming a finished run
    function arriveAtRecap(celebrate) {
      setHint('');
      if (celebrate && !reducedMotion) {
        robotMode = { kind: 'present', x: 1.6, z: recapRoom.cz - 1.6 };
        robotGesture('celebrate');
        robotSay('You made it — well done!', null, true);
        POST.pulse();
        spawnConfetti();
        requestRender(4.5);
      } else {
        robotMode = { kind: 'present', x: 1.6, z: recapRoom.cz - 1.6 };
        robotSay('You made it — well done!');
      }
      openRecapOverlay();
    }

    /* =========================== the robot companion =========================== */

    // Wawi, redesigned: glossy white shell with teal/red accents, env-mapped
    // so it catches the studio reflections; emissive eyes on a dark visor;
    // articulated arms and head for the idle + the consequence gestures.
    function buildRobot() {
      var shell = mat(0xF7FAFB, { roughness: 0.13, metalness: 0.05, envMapIntensity: 1.45 });
      var visorMat = mat(0x0A1826, { roughness: 0.08, metalness: 0.25, envMapIntensity: 1.5 });
      var accent = MAT.robot, red = MAT.red, metal = MAT.trim;
      function part(mesh) { mesh.castShadow = true; mesh.receiveShadow = true; return mesh; }

      var g = new THREE.Group();
      var body = part(new THREE.Mesh(new THREE.SphereGeometry(0.34, 32, 24), shell));
      body.scale.set(1, 1.22, 0.92);
      body.position.y = 0.6;
      g.add(body);
      // teal belly plate + chest light
      var belly = part(new THREE.Mesh(roundedBoxGeometry(0.3, 0.34, 0.1, 0.05, 2), accent));
      belly.position.set(0, 0.58, 0.27);
      belly.rotation.x = -0.12;
      g.add(belly);
      var chestLight = new THREE.Mesh(new THREE.SphereGeometry(0.035, 12, 10), MAT.glowTeal);
      chestLight.position.set(0, 0.66, 0.325);
      g.add(chestLight);
      // red waist band
      var band = part(new THREE.Mesh(new THREE.TorusGeometry(0.315, 0.028, 10, 40), red));
      band.rotation.x = Math.PI / 2;
      band.position.y = 0.44;
      g.add(band);

      // head group: aims at the player, carries visor + eyes + antenna
      var headG = new THREE.Group();
      headG.position.y = 1.16;
      var skull = part(new THREE.Mesh(new THREE.SphereGeometry(0.245, 32, 24), shell));
      skull.scale.set(1, 0.92, 0.96);
      headG.add(skull);
      var visor = part(new THREE.Mesh(new THREE.SphereGeometry(0.2, 28, 20), visorMat));
      visor.scale.set(1.02, 0.62, 0.55);
      visor.position.set(0, 0.015, 0.155); // proud of the skull: a real face
      headG.add(visor);
      var eyes = [];
      [-0.075, 0.075].forEach(function (x) {
        var eye = new THREE.Mesh(new THREE.SphereGeometry(0.038, 14, 12),
          glow(COL.tealBright, 3.2));
        eye.position.set(x, 0.02, 0.262);
        eye.scale.z = 0.55;
        headG.add(eye);
        eyes.push(eye);
      });
      var stalk = part(new THREE.Mesh(new THREE.CylinderGeometry(0.014, 0.014, 0.2, 10), metal));
      stalk.position.y = 0.3;
      headG.add(stalk);
      var tip = new THREE.Mesh(new THREE.SphereGeometry(0.045, 14, 12), glow(COL.red, 2.2));
      tip.position.y = 0.42;
      headG.add(tip);
      g.add(headG);

      // arms: pivot at the shoulder so gestures can raise them
      function buildArm(side) {
        var arm = new THREE.Group();
        arm.position.set(side * 0.36, 0.78, 0);
        var upper = part(new THREE.Mesh(new THREE.SphereGeometry(0.07, 16, 12), shell));
        upper.scale.set(0.75, 1.9, 0.75);
        upper.position.y = -0.12;
        arm.add(upper);
        var hand = part(new THREE.Mesh(new THREE.SphereGeometry(0.085, 16, 12), accent));
        hand.position.y = -0.28;
        arm.add(hand);
        var cuff = part(new THREE.Mesh(new THREE.TorusGeometry(0.075, 0.018, 8, 24), red));
        cuff.rotation.x = Math.PI / 2;
        cuff.position.y = -0.2;
        arm.add(cuff);
        arm.rotation.z = side * 0.22; // rest: slightly out from the body
        g.add(arm);
        return arm;
      }
      var armL = buildArm(-1), armR = buildArm(1);

      // hover base: metal skirt + teal halo
      var skirt = part(new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.24, 0.1, 24), metal));
      skirt.position.y = 0.22;
      g.add(skirt);
      var halo = new THREE.Mesh(new THREE.TorusGeometry(0.3, 0.035, 10, 32), MAT.glowSoft);
      halo.rotation.x = Math.PI / 2;
      halo.position.y = 0.1;
      g.add(halo);

      g.userData.rig = {
        body: body, head: headG, eyes: eyes, armL: armL, armR: armR,
        nextBlink: 2.5, blinkUntil: 0, gesture: null, gestureT0: 0
      };
      world.add(g);
      track(g);
      return g;
    }

    /* =========================== HUD + bubble + hint =========================== */

    var hud = el('div', 'g3d-hud');
    hud.appendChild(C.svgEl(C.SVG.logo, 'g3d-logo'));
    var counter = el('span', 'g3d-count', '');
    hud.appendChild(counter);
    // the tiny quality toggle: Auto cycles to forced High / Med / Low
    var qBtn = el('button', 'g3d-q', '');
    qBtn.type = 'button';
    qBtn.title = 'Graphics quality';
    hud.appendChild(qBtn);
    var TIER_SHORT = { high: 'HIGH', medium: 'MED', low: 'LOW' };
    function refreshQualityHud() {
      qBtn.textContent = quality.mode === 'auto'
        ? 'AUTO·' + TIER_SHORT[quality.tier] : TIER_SHORT[quality.tier];
    }
    function setQualityMode(mode) {
      quality.mode = mode;
      try { localStorage.setItem('practice-studio:g3d:quality', mode); } catch (e) { /* ignore */ }
      if (mode !== 'auto') applyTier(mode);
      else if (quality.probed) {
        applyTier(reducedMotion ? 'low'
          : quality.fps >= 44 ? 'high' : quality.fps >= 28 ? 'medium' : 'low');
      }
      refreshQualityHud();
    }
    qBtn.addEventListener('click', function () {
      var order = ['auto', 'high', 'medium', 'low'];
      setQualityMode(order[(order.indexOf(quality.mode) + 1) % order.length]);
    });
    refreshQualityHud();
    rootNode.appendChild(hud);

    var hint = el('div', 'g3d-hint', '');
    hint.style.display = 'none';
    rootNode.appendChild(hint);
    function setHint(text) {
      hint.textContent = text || '';
      hint.style.display = text ? '' : 'none';
    }
    function refreshCounter() {
      var n = (state.answers[PATH_KEY] || []).length;
      counter.textContent = n ? 'Step ' + n : '';
    }

    var bubble = el('div', 'g3d-bubble');
    bubble.style.display = 'none';
    rootNode.appendChild(bubble);
    var bubbleTimer = null;
    function robotSay(text, tag, sticky) {
      if (!text) return;
      bubble.textContent = '';
      bubble.appendChild(el('span', 'g3d-bubble-name', 'Wawi'));
      var line = el('span', null, text);
      bubble.appendChild(line);
      if (tag) bubble.appendChild(C.tagPill(tag));
      bubble.style.display = '';
      if (bubbleTimer) window.clearTimeout(bubbleTimer);
      if (!sticky) {
        bubbleTimer = window.setTimeout(function () { bubble.style.display = 'none'; }, 9000);
      }
    }
    function robotHush() {
      bubble.style.display = 'none';
      if (bubbleTimer) window.clearTimeout(bubbleTimer);
    }

    /* =========================== player + controls =========================== */

    var player = {
      x: 0, z: roomZ(0) + ROOM_D / 2 + 2.2, yaw: Math.PI, pitch: 0,
      walk: null // {points:[{x,z}...], seg:0}
    };
    // yaw PI => looking toward -Z (into the world)
    var keys = {};
    var started = false;

    function clampHalfWidth(z) {
      // inside a room's z band the full room width is walkable; between rooms
      // only the corridor is (the detour duct is narrower)
      if (recapRoom && z > recapRoom.cz - RECAP_D / 2 + 0.35 && z < recapRoom.cz + RECAP_D / 2 - 0.35) {
        return RECAP_W / 2 - 0.85;
      }
      for (var i = 0; i < builtRooms.length; i++) {
        var cz = builtRooms[i].cz;
        if (z > cz - ROOM_D / 2 + 0.35 && z < cz + ROOM_D / 2 - 0.35) return ROOM_W / 2 - 0.85;
      }
      for (var s = 0; s < CORRIDOR_SEGS.length; s++) {
        var seg = CORRIDOR_SEGS[s];
        if (z <= seg.z0 && z >= seg.z1) return seg.width / 2 - 0.5;
      }
      return CORRIDOR_W / 2 - 0.55;
    }
    function clampZRange() {
      // in the frontier room, stop right at the card arc: close enough to
      // read everything, never nose-first into the floating panel. In the
      // finale, roam up to the podium.
      if (recapRoom) return { min: recapRoom.cz - 1.4, max: roomZ(0) + ROOM_D / 2 + 3.2 };
      var frontier = builtRooms[builtRooms.length - 1];
      return { min: frontier.cz - 0.6, max: roomZ(0) + ROOM_D / 2 + 3.2 };
    }
    function clampPlayer() {
      var zr = clampZRange();
      player.z = Math.min(zr.max, Math.max(zr.min, player.z));
      var half = clampHalfWidth(player.z);
      player.x = Math.min(half, Math.max(-half, player.x));
    }

    // Auto-walk routes through door planes at x=0 so walls are never clipped.
    function walkTo(x, z) {
      var points = [];
      var doorPlanes = [];
      builtRooms.forEach(function (r) {
        doorPlanes.push(r.cz + ROOM_D / 2); // entrance plane
        doorPlanes.push(r.cz - ROOM_D / 2); // exit plane
      });
      if (recapRoom) doorPlanes.push(recapRoom.cz + RECAP_D / 2);
      doorPlanes.sort(function (a, b) { return b - a; });
      var fromZ = player.z, toZ = z;
      doorPlanes.forEach(function (dp) {
        if ((fromZ > dp && toZ < dp) || (fromZ < dp && toZ > dp)) {
          points.push({ x: 0, z: dp });
        }
      });
      points.sort(function (a, b) { return fromZ > toZ ? b.z - a.z : a.z - b.z; });
      points.push({ x: x, z: z });
      if (reducedMotion) {
        // reduced motion: arrive instantly, no glide
        player.x = x; player.z = z;
        clampPlayer();
        return;
      }
      // total path length: the walk eases in and eases out over it
      var total = 0, px = player.x, pz = player.z;
      points.forEach(function (p) {
        total += Math.sqrt((p.x - px) * (p.x - px) + (p.z - pz) * (p.z - pz));
        px = p.x; pz = p.z;
      });
      player.walk = { points: points, seg: 0, total: Math.max(total, 0.001), done: 0 };
    }

    var dragging = false, dragDist = 0, lastPX = 0, lastPY = 0;
    var dom = renderer.domElement;
    dom.style.cursor = 'grab';

    dom.addEventListener('pointerdown', function (e) {
      dragging = true; dragDist = 0; lastPX = e.clientX; lastPY = e.clientY;
      try { dom.setPointerCapture && dom.setPointerCapture(e.pointerId); }
      catch (err) { /* synthetic or stale pointer: capture is a nicety */ }
    });
    dom.addEventListener('pointermove', function (e) {
      if (dragging) {
        var dx = e.clientX - lastPX, dy = e.clientY - lastPY;
        lastPX = e.clientX; lastPY = e.clientY;
        dragDist += Math.abs(dx) + Math.abs(dy);
        player.yaw -= dx * 0.0052;
        player.pitch = Math.min(0.95, Math.max(-1.05, player.pitch - dy * 0.0042));
        requestRender(0.25);
      } else {
        hoverProbe(e.clientX, e.clientY);
      }
    });
    dom.addEventListener('pointerup', function (e) {
      dragging = false;
      if (dragDist < 6) handleClick(e.clientX, e.clientY);
    });
    window.addEventListener('keydown', function (e) {
      if (overlayOpen()) return; // typing a reflection must never move the player
      keys[e.code] = true;
      requestRender(0.3);
      if (['KeyW', 'KeyA', 'KeyS', 'KeyD', 'ArrowUp', 'ArrowDown'].indexOf(e.code) !== -1) {
        player.walk = null;
      }
    });
    window.addEventListener('keyup', function (e) { keys[e.code] = false; });

    var raycaster = new THREE.Raycaster();
    var ndc = new THREE.Vector2();
    function castAt(px, py) {
      ndc.x = (px / window.innerWidth) * 2 - 1;
      ndc.y = -(py / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(ndc, camera);
      var targets = [];
      builtRooms.forEach(function (r) {
        if (!r.decided) r.cards.forEach(function (c) { targets.push(c.mesh); });
        if (r.waypoint.visible) targets.push(r.waypoint);
      });
      var hits = raycaster.intersectObjects(targets, false);
      return hits.length ? hits[0].object : null;
    }

    var hovered = null;
    function hoverProbe(px, py) {
      if (!started || overlayOpen()) return;
      var obj = castAt(px, py);
      if (hovered && hovered !== obj) {
        hovered.scale.set(1, 1, 1);
        hovered = null;
        dom.style.cursor = 'grab';
        requestRender(0.3);
      }
      if (obj && obj.userData.kind === 'card') {
        hovered = obj;
        obj.scale.set(1.06, 1.06, 1.06);
        dom.style.cursor = 'pointer';
        requestRender(0.3);
      } else if (obj) {
        dom.style.cursor = 'pointer';
      }
    }

    function handleClick(px, py) {
      if (!started || overlayOpen()) return;
      var obj = castAt(px, py);
      if (!obj) {
        // click the floor: walk there
        var plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        var pt = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, pt);
        if (pt) walkTo(pt.x, pt.z);
        return;
      }
      var room = roomBySceneId(obj.userData.sceneId);
      if (obj.userData.kind === 'waypoint') {
        walkTo(obj.position.x, obj.userData.targetZ !== undefined ? obj.userData.targetZ : obj.position.z);
        return;
      }
      if (obj.userData.kind === 'card' && room && !room.decided) {
        // too far to read? walk up first, then decide
        var dist = Math.sqrt(Math.pow(player.x - obj.position.x, 2) + Math.pow(player.z - obj.position.z, 2));
        if (dist > 6.5) { walkTo(0, room.cz + 1.6); return; }
        commitChoice(room, obj.userData.optionId);
      }
    }

    /* =========================== game flow =========================== */

    var builtRooms = [];   // in build order; last is the frontier
    function roomBySceneId(id) {
      return builtRooms.filter(function (r) { return r.scene.id === id; })[0] || null;
    }

    function appendRoom(sceneId) {
      var scene = sceneById(activity, sceneId);
      if (!scene) return null;
      var index = builtRooms.length;
      if (index > 0) buildCorridor(index, isDetourScene(scene));
      var room = buildRoom(scene, index);
      builtRooms.push(room);
      return room;
    }

    function enterRoom(room) {
      if (room.entered) return;
      room.entered = true;
      var path = state.answers[PATH_KEY];
      if (path.indexOf(room.scene.id) === -1) {
        path.push(room.scene.id);
        C.saveAnswers(activity, state.answers);
      }
      refreshCounter();
      if (!room.decided) {
        room.waypoint.visible = false;
        setHint('Click a card to decide');
        robotSay(room.scene.setup || room.scene.decision.prompt);
        robotMode = { kind: 'follow' };
      }
      // the crisis room announces itself: a short alarm flicker on arrival
      if (room.theme === 'failure' && !room.decided && !reducedMotion) {
        room.flickerUntil = clock.elapsedTime + 3.6;
        requestRender(3.8);
      }
    }

    function routeLineFor(option) {
      var keysR = option.routes_to || [];
      if (!keysR.length) return '';
      var nums = keysR.map(function (k) { return (k.match(/\d+/) || [''])[0]; }).filter(Boolean);
      return nums.length ? 'Revisit Lesson ' + nums.join(', ') : '';
    }

    function commitChoice(room, optionId) {
      var scene = room.scene;
      var option = optionById(scene, optionId);
      if (!option) return;
      state.answers[FB.decisionKey(scene)] = option.id;
      C.saveAnswers(activity, state.answers);
      room.decided = true;
      playConsequence(room, option, false);
    }

    // The room reacts: cards commit/sink, the wall screen shows the shared
    // tag, the light takes the tag color, the robot presents the consequence.
    function playConsequence(room, option, isReplay) {
      var scene = room.scene;
      var d = FB.evaluateDecision(scene, option.id, activity, state.checks);
      room.cards.forEach(function (c) {
        var isChosen = c.option.id === option.id;
        c.tex.redraw();
        c.mesh.userData.sink = !isChosen;
        c.mesh.userData.pop = isChosen && !isReplay && !reducedMotion;
        if (reducedMotion || isReplay) {
          // no animation: settle instantly
          if (!isChosen) c.mesh.position.y = c.mesh.userData.baseY - 1.05;
        }
      });
      room.screenTex.redraw = function () { /* replaced below */ };
      var entry = room.screenTex;
      entry.redraw = function () {
        drawScreenConsequence(entry.canvas.getContext('2d'), entry.canvas, d.tag, option, routeLineFor(option));
        entry.texture.needsUpdate = true;
      };
      entry.redraw();
      room.lightTargetHex = TAG_HEX[d.tag] || 0xEAF6F8;
      if (reducedMotion || isReplay) {
        room.light.color.setHex(room.lightTargetHex);
        room.light.intensity = 40;
      }

      if (!isReplay) {
        robotMode = { kind: 'present', x: -ROOM_W / 2 + 1.4, z: room.cz - 0.6 };
        robotSay(option.consequence, d.tag, true);
        POST.pulse(); // a short glow swell as the room takes the tag color
        robotGesture({ Ready: 'ready', Light: 'light', Revise: 'revise' }[d.tag] || 'light');
        requestRender(2.6); // the reveal beat renders at full rate
        openConsequenceOverlay(room, option, d);
      }
      setHint('');
    }

    function overlayNode() { return rootNode.querySelector('.g3d-overlay'); }
    function overlayOpen() { return !!overlayNode(); }
    function closeOverlay() {
      var node = overlayNode();
      if (node) node.remove();
    }

    // After the in-world beat: the compact reflection (same field editor,
    // same checks, same live coach) and the walk-on button.
    function openConsequenceOverlay(room, option, d) {
      closeOverlay();
      var scene = room.scene;
      var sheet = el('div', 'g3d-overlay');

      if (scene.reflection) {
        var editor = C.fieldEditor(state, activity, scene.reflection, {
          embedded: true, badge: '✎', checkLabel: 'Check'
        });
        sheet.appendChild(editor.card);
        // the robot mentors: mirror whichever feedback block lands (local
        // check or live coach) into the speech bubble, without touching core
        var observer = new MutationObserver(function () {
          var blocks = sheet.querySelectorAll('.has-feedback');
          if (!blocks.length) return;
          var last = blocks[blocks.length - 1];
          var line = last.querySelector('.feedback-line');
          var pill = last.querySelector('.tag-pill');
          if (line && line.textContent) {
            robotSay(line.textContent, pill ? pill.textContent : null, true);
          }
        });
        observer.observe(sheet, { childList: true, subtree: true });
      }

      var nextId = nextSceneId(activity, scene, option);
      var row = el('div', 'g3d-continue');
      // 2D parity: a decision is re-pickable until the student walks on
      var repick = el('button', 'btn btn-ghost', 'Change my choice');
      repick.type = 'button';
      repick.addEventListener('click', function () {
        closeOverlay();
        reopenChoice(room);
      });
      row.appendChild(repick);
      var btn = el('button', 'btn btn-primary', nextId ? 'Continue' : 'See where it led');
      btn.type = 'button';
      btn.addEventListener('click', function () {
        closeOverlay();
        robotHush();
        advanceFrom(room, nextId);
      });
      row.appendChild(btn);
      sheet.appendChild(row);
      rootNode.appendChild(sheet);
    }

    // Re-open a decided station (before advancing): cards rise back, the
    // screen idles, the light returns to the room's own tint, the robot
    // heels again. The stored answer stays until a different card commits —
    // exactly the 2D game's behavior.
    function reopenChoice(room) {
      room.decided = false;
      room.cards.forEach(function (c) {
        c.mesh.userData.sink = false;
        c.mesh.userData.pop = false;
        c.mesh.position.y = c.mesh.userData.baseY;
        c.tex.redraw(); // the previous pick stays highlighted, 2D-style
      });
      var entry = room.screenTex;
      entry.redraw = function () {
        drawScreenIdle(entry.canvas.getContext('2d'), entry.canvas);
        entry.texture.needsUpdate = true;
      };
      entry.redraw();
      room.lightTargetHex = null;
      room.light.color.setHex(room.baseLightHex);
      room.light.intensity = 26;
      robotMode = { kind: 'follow' };
      robotHush();
      setHint('Pick a different card');
      requestRender(0.6);
    }

    function advanceFrom(room, nextId) {
      robotMode = { kind: 'follow' };
      if (!nextId) { goToRecap(); return; }
      var nextRoom = roomBySceneId(nextId) || appendRoom(nextId);
      if (!nextRoom) { goToRecap(); return; }
      nextRoom.waypoint.visible = !nextRoom.decided;
      setHint(isDetourScene(nextRoom.scene)
        ? 'A detour — follow the amber lights'
        : 'Follow the lit ring');
      fadeBeat();
      walkTo(0, nextRoom.cz + 1.6);
    }

    /* ----- the designed export: "your path" as a one-page artifact -----
       Reuses the Wawiwa print design system that ships in every build
       (styles.css print rules): the branded hero with the line-art motif,
       path rows with tag chips, reflection tiles, and the coach's closing
       note. Built on demand (Export button or the browser's own print). */

    var lastDebriefText = ''; // the live coach's closing note, if asked

    function buildExportSheet() {

      heroInner.appendChild(el('span',
        'print-level print-level-' + evalResult.overall.levelIndex, evalResult.overall.level));
      hero.appendChild(heroInner);

      var pathBlock = el('div', 'print-section');

      (state.answers[PATH_KEY] || []).forEach(function (sceneId, i) {

          d.tag || 'Not decided'));

      var grid = el('div', 'print-tiles');

          text || 'Not written yet.'));

      });

      // the coach's closing note: rubric verdicts, plus the live debrief if asked

      evalResult.rubric.forEach(function (r) {

          r.tag || 'Coach'));

        body.appendChild(el('div', 'print-path-choice', r.verdict));

    window.addEventListener('beforeprint', buildExportSheet);

    /* the same content as the print sheet, as the shared report data model
       the code-generated PDF (engine/export.js) draws */
    function reportData() {
      var evalResult = FB.evaluateActivity(activity, state.checks, state.answers);

      var pathCards = [];
      (state.answers[PATH_KEY] || []).forEach(function (sceneId, i) {
        var scene = sceneById(activity, sceneId);
        if (!scene) return;
        var d = FB.evaluateDecision(scene, state.answers[FB.decisionKey(scene)], activity, state.checks);
        var rows = [];
        if (d.option) {
          rows.push({ label: 'Your call:', value: d.option.label });
          rows.push({ label: 'Where it led:', value: d.option.consequence });
        } else {
          rows.push({ value: 'No call made on this stop.', empty: true });
        }
        pathCards.push({ num: i + 1, title: scene.title, tag: d.tag || null, rows: rows });
      });

      var reflectionCards = FB.collectFields(activity).map(function (field, i) {
        var text = (state.answers[field.id] || '').trim();
        return {
          num: i + 1,
          title: field.label,
          rows: [{ value: text || 'Not written yet.', empty: !text }]
        };
      });

      var coachCards = evalResult.rubric.map(function (r) {
        return { title: r.name, tag: r.tag || null, rows: [{ value: r.verdict }] };
      });
      if (lastDebriefText) {
        coachCards.push({ title: 'Mentor debrief', rows: [{ value: lastDebriefText }] });
      }

      return {
        level: { index: evalResult.overall.levelIndex, label: evalResult.overall.level },
        sections: [
          { title: 'Your path', cards: pathCards, wide: true },
          { title: 'Your reflections', cards: reflectionCards },
          { title: 'The coach’s note', cards: coachCards, wide: true }
        ]
      };
    }

    function goToRecap() {
      buildRecapRoom();
      setHint('Walk to the podium');
      fadeBeat();
      walkTo(0, recapRoom.cz + 1.6);
    }

    // the mechanics half of the recap: same review (levelBanner is where
    // passback hooks, untouched), same debrief, same restart — in a bottom
    // sheet so the finale room stays on screen behind it
    function openRecapOverlay() {
      closeOverlay();
      var sheet = el('div', 'g3d-overlay');
      sheet.appendChild(el('div', 'g3d-kicker g3d-kicker-dark', 'The recap'));

      reviewBtn.addEventListener('click', function () {

        var evalResult = FB.evaluateActivity(activity, state.checks, state.answers);
        out.appendChild(C.levelBanner(evalResult)); // passback hooks here, untouched
        out.appendChild(C.rubricBox(evalResult));
      });
      btnRow.appendChild(reviewBtn);

        btnRow.appendChild(C.coachButton(state, 'Mentor debrief', function (b) {

      var exportBtn = el('button', 'btn btn-ghost', 'Export my path');

      });

      var restartBtn = el('button', 'btn btn-ghost', 'Play a different path');
      restartBtn.type = 'button';
      restartBtn.addEventListener('click', function () {
        if (!window.confirm('Start over? Decisions reset; reflections stay saved.')) return;
        scenesOf(activity).forEach(function (s) { delete state.answers[FB.decisionKey(s)]; });
        state.answers[PATH_KEY] = [];
        C.saveAnswers(activity, state.answers);

      });

      sheet.appendChild(btnRow);

    /* =========================== title screen =========================== */

    function buildTitleScreen(onStart) {
      var scr = el('div', 'g3d-screen');
      var frame = el('div', 'g3d-screen-frame');

      frame.appendChild(el('h1', 'g3d-title', activity.meta.title));

      chips.appendChild(el('span', 'meta-chip', '3D'));
      chips.appendChild(el('span', 'meta-chip' + (C.liveOn() ? ' meta-chip-live' : ''),
        C.liveOn() ? 'Live coach' : 'Local coach'));

      // the PII rule at a glance; the full authored notice one tap away

      clearBtn.type = 'button';

      start.type = 'button';

    /* =========================== resume =========================== */

    function resumeWorld() {
      var path = state.answers[PATH_KEY];
      if (!path.length) {
        appendRoom(scenesOf(activity)[0].id);
        return;
      }
      // rebuild every traveled room; replay decided consequences quietly
      path.forEach(function (sceneId) { appendRoom(sceneId); });
      builtRooms.forEach(function (room) {
        room.entered = true;
        var chosenId = state.answers[FB.decisionKey(room.scene)];
        if (chosenId) {
          var option = optionById(room.scene, chosenId);
          if (option) playConsequence(room, option, true);
        }
      });
      var last = builtRooms[builtRooms.length - 1];
      var decidedId = state.answers[FB.decisionKey(last.scene)];
      if (!decidedId) {
        player.x = 0; player.z = last.cz + 2.6;
        setHint('Click a card to decide');
        return;
      }
      // frontier already decided: extend to the next room, or the finale
      var nid = nextSceneId(activity, last.scene, optionById(last.scene, decidedId));
      if (nid === null) {
        // a finished run resumes inside the recap room, no celebration replay
        buildRecapRoom();
        recapRoom.entered = true;
        player.x = 0; player.z = recapRoom.cz + 2.4;
        arriveAtRecap(false);
        return;
      }
      var nextRoom = appendRoom(nid);
      nextRoom.waypoint.visible = true;
      // resume in the corridor, past the decided room's exit door, facing on
      player.x = 0; player.z = last.cz - ROOM_D / 2 - 0.8;
      setHint(isDetourScene(nextRoom.scene)
        ? 'A detour — follow the amber lights'
        : 'Follow the lit ring');
    }

    /* =========================== robot + loop =========================== */

    var robot = buildRobot();
    var robotMode = { kind: 'follow' };
    var robotSpawned = false;
    var headPos = new THREE.Vector3();

    function robotGesture(name) {
      var rig = robot.userData.rig;
      if (!rig || reducedMotion) return; // calm tier: no acted-out beats
      rig.gesture = name;
      rig.gestureT0 = clock.elapsedTime;
    }

    function updateRobot(dt, t) {
      var tx, tz;
      if (robotMode.kind === 'present') {
        tx = robotMode.x; tz = robotMode.z;
      } else {
        // heel ahead-right of the gaze, in view, so the bubble reads naturally
        var a = player.yaw - 0.7;
        tx = player.x + Math.sin(a) * 1.9;
        tz = player.z + Math.cos(a) * 1.9;
        // never through a wall: the robot respects the same walkable width
        // as the player (tight in the detour duct)
        var rhalf = clampHalfWidth(tz) - 0.15;
        tx = Math.min(rhalf, Math.max(-rhalf, tx));
      }
      // first frame: appear at the heel, never glide in from the world origin
      var k = (reducedMotion || !robotSpawned) ? 1 : Math.min(1, dt * 3.2);
      robotSpawned = true;
      robot.position.x += (tx - robot.position.x) * k;
      robot.position.z += (tz - robot.position.z) * k;
      robot.position.y = reducedMotion ? 0.15 : 0.15 + Math.sin(t * 1.8) * 0.05;
      robot.lookAt(player.x, robot.position.y + 0.7, player.z);

      /* --- character: breathing, blink, head look-at, gestures --- */
      var rig = robot.userData.rig;
      if (rig) {
        if (!reducedMotion) {
          rig.body.scale.y = 1.22 * (1 + Math.sin(t * 1.5) * 0.014); // gentle breath
        }
        // occasional blink (eyes squash shut for a beat)
        if (t > rig.nextBlink) { rig.blinkUntil = t + 0.13; rig.nextBlink = t + 2.6 + Math.sin(t * 7.3) * 1.6 + 1.4; }
        var blink = t < rig.blinkUntil ? 0.12 : 1;
        rig.eyes.forEach(function (e) { e.scale.y = blink; });
        // the head leads the look: aim at the player's eyes, a touch above body aim
        rig.head.lookAt(player.x, EYE + 0.05, player.z);
        // gestures on the consequence: expressive but short
        var GD = 2.2;
        var gp = rig.gesture ? Math.min(1, (t - rig.gestureT0) / GD) : 1;
        var env = rig.gesture ? Math.sin(gp * Math.PI) : 0;   // rise, hold-ish, settle
        var restL = -0.22, restR = 0.22;
        if (rig.gesture === 'ready') {
          // thumbs-up: right arm swings up front, two happy nods
          rig.armR.rotation.x = -2.1 * env;
          rig.armR.rotation.z = restR * (1 - env);
          rig.armL.rotation.x = 0; rig.armL.rotation.z = restL;
          rig.head.rotation.x += Math.sin(gp * Math.PI * 4) * 0.12 * env;
        } else if (rig.gesture === 'revise') {
          // thoughtful beat: hand toward the chin, head tilts, slow
          rig.armL.rotation.x = -1.45 * env;
          rig.armL.rotation.z = restL * (1 - env) - 0.35 * env;
          rig.armR.rotation.x = 0; rig.armR.rotation.z = restR;
          rig.head.rotation.z = 0.2 * env;
          rig.head.rotation.x += 0.12 * env;
        } else if (rig.gesture === 'light') {
          // acknowledging half-nod, one hand half-raised
          rig.armR.rotation.x = -0.9 * env;
          rig.head.rotation.x += Math.sin(gp * Math.PI * 2) * 0.1 * env;
        } else if (rig.gesture === 'celebrate') {
          // both arms high, a happy wave, little hops: the finale beat
          rig.armL.rotation.x = -2.5 * env;
          rig.armR.rotation.x = -2.5 * env;
          rig.armL.rotation.z = (-0.22 - Math.sin(t * 9) * 0.25) * env;
          rig.armR.rotation.z = (0.22 + Math.sin(t * 9 + 1) * 0.25) * env;
          rig.head.rotation.x += Math.sin(gp * Math.PI * 5) * 0.1 * env;
          robot.position.y += Math.pow(Math.abs(Math.sin(gp * Math.PI * 3)), 2) * 0.2 * env;
        } else {
          rig.armL.rotation.x = 0; rig.armL.rotation.z = restL;
          rig.armR.rotation.x = 0; rig.armR.rotation.z = restR;
          rig.head.rotation.z = 0;
        }
        if (rig.gesture && gp >= 1) rig.gesture = null;
      }

      // speech bubble tracks the robot's head on screen
      if (bubble.style.display !== 'none') {
        headPos.set(robot.position.x, robot.position.y + 1.75, robot.position.z);
        headPos.project(camera);
        if (headPos.z > 1 || headPos.z < -1) { bubble.style.visibility = 'hidden'; return; }
        var sx = (headPos.x * 0.5 + 0.5) * window.innerWidth;
        var sy = (-headPos.y * 0.5 + 0.5) * window.innerHeight;
        sx = Math.min(window.innerWidth - 160, Math.max(160, sx));
        sy = Math.min(window.innerHeight - 40, Math.max(120, sy));
        bubble.style.visibility = '';
        bubble.style.left = sx + 'px';
        bubble.style.top = sy + 'px';
      }
    }

    function updatePlayer(dt) {
      var speed = 4.2;
      var moved = false;
      if (player.walk) {
        var target = player.walk.points[player.walk.seg];
        var dx = target.x - player.x, dz = target.z - player.z;
        var dist = Math.sqrt(dx * dx + dz * dz);
        // cinematic ease: accelerate out of the stop, glide into the arrival
        var w = player.walk;
        var remaining = Math.max(0, w.total - w.done);
        var ease = Math.min(1, 0.22 + w.done / 1.1) * Math.min(1, 0.18 + remaining / 2.0);
        var step = speed * Math.max(0.25, ease) * dt;
        w.done += step;
        if (dist <= step) {
          player.x = target.x; player.z = target.z;
          player.walk.seg++;
          if (player.walk.seg >= player.walk.points.length) player.walk = null;
        } else {
          player.x += (dx / dist) * step;
          player.z += (dz / dist) * step;
          // ease the gaze toward where the feet are going
          if (!reducedMotion) {
            var wantYaw = Math.atan2(dx, dz);
            var dy = wantYaw - player.yaw;
            while (dy > Math.PI) dy -= Math.PI * 2;
            while (dy < -Math.PI) dy += Math.PI * 2;
            player.yaw += dy * Math.min(1, dt * 2.2);
          }
        }
        moved = true;
      } else {
        var f = (keys.KeyW || keys.ArrowUp ? 1 : 0) - (keys.KeyS || keys.ArrowDown ? 1 : 0);
        var s = (keys.KeyD ? 1 : 0) - (keys.KeyA ? 1 : 0);
        if (f || s) {
          var len = Math.sqrt(f * f + s * s);
          f /= len; s /= len;
          player.x += (Math.sin(player.yaw) * f + Math.sin(player.yaw - Math.PI / 2) * s) * speed * dt;
          player.z += (Math.cos(player.yaw) * f + Math.cos(player.yaw - Math.PI / 2) * s) * speed * dt;
          moved = true;
        }
      }
      clampPlayer();
      return moved;
    }

    function updateRooms(dt, t) {
      builtRooms.forEach(function (room) {
        // proximity: entering a room engages its station
        if (!room.entered && Math.abs(player.z - (room.cz + 1.6)) < 2.6 && Math.abs(player.x) < 3) {
          enterRoom(room);
        }
        // light drifts smoothly toward the consequence color and brightens
        if (room.lightTargetHex !== null && !reducedMotion) {
          var target = new THREE.Color(room.lightTargetHex);
          room.light.color.lerp(target, Math.min(1, dt * 2));
          room.light.intensity += (40 - room.light.intensity) * Math.min(1, dt * 2);
        }
        // the crisis room's arrival beat: alarm beacons + light flicker
        if (room.flickerUntil && t < room.flickerUntil) {
          var fl = 1.8 + Math.sin(t * 10.5) * 1.3;
          room.group.traverse(function (n) {
            if (n.userData.beacon && n.material) n.material.emissiveIntensity = Math.max(0.6, fl);
          });
          if (room.lightTargetHex === null) {
            room.light.intensity = 26 + Math.sin(t * 11.5) * 3;
          }
        } else if (room.flickerUntil) {
          room.flickerUntil = 0;
          room.group.traverse(function (n) {
            if (n.userData.beacon && n.material) n.material.emissiveIntensity = 2.6;
          });
          if (room.lightTargetHex === null) room.light.intensity = 26;
        }
        // waypoint pulse
        if (room.waypoint.visible && !reducedMotion) {
          var p = 1 + Math.sin(t * 3) * 0.08;
          room.waypoint.scale.set(p, p, 1);
        }
        room.cards.forEach(function (c) {
          var m = c.mesh;
          if (m.userData.sink && m.position.y > m.userData.baseY - 1.05) {
            m.position.y -= dt * 1.6;
          }
          if (m.userData.pop) {
            m.position.y = m.userData.baseY + Math.sin(t * 2.4) * 0.04 + 0.08;
          } else if (!m.userData.sink && !reducedMotion) {
            m.position.y = m.userData.baseY + Math.sin(t * 1.6 + m.userData.idx) * 0.03;
          }
        });
        room.group.children.forEach(function (node) {
          if (node.userData.spin && !reducedMotion) node.rotation.y += dt * 0.8;
        });
      });
    }

    var clock = new THREE.Clock();
    var bobPhase = 0;
    var running = true;
    document.addEventListener('visibilitychange', function () {
      running = !document.hidden;
      if (running) clock.getDelta(); // swallow the hidden gap
    });

    function frame() {
      window.requestAnimationFrame(frame);
      if (!running) return;
      var dt = Math.min(clock.getDelta(), 0.05);
      var t = clock.elapsedTime;
      var moved = started && !overlayOpen() ? updatePlayer(dt) : false;
      updateRooms(dt, t);
      updateRecap(dt, t);
      updateRobot(dt, t);

      // what counts as "something is happening" (full-rate rendering)
      var rig = robot.userData.rig;
      var robotBusy = rig && rig.gesture;
      var lightsBusy = builtRooms.some(function (r) {
        return r.lightTargetHex !== null && Math.abs(r.light.intensity - 40) > 0.5;
      });
      if (moved || player.walk || dragging || robotBusy || POST.active() || lightsBusy) {
        requestRender(0.12);
      }
      var idlePeriod = 1 / TIERS[quality.tier].idleFps;
      var active = probing || t < activityUntil;
      if (!active && t - lastRenderT < idlePeriod) return; // idle: throttled

      // FPS readout: meaningful only across consecutive full-rate frames
      if (active && lastRenderT >= 0 && t - lastRenderT < 0.1) {
        quality.fps = quality.fps ? quality.fps * 0.92 + (1 / dt) * 0.08 : 1 / dt;
      }
      lastRenderT = t;

      // startup probe: ~0.9s of continuous rendering behind the title
      // screen, then the tier locks in (unless the student forced one)
      if (probing) {
        if (!probeStart) probeStart = t;
        probeFrames++;
        if (t - probeStart > 0.9 && probeFrames > 8) {
          probing = false;
          quality.probed = true;
          var auto = reducedMotion ? 'low'
            : quality.fps >= 44 ? 'high' : quality.fps >= 28 ? 'medium' : 'low';
          applyTier(quality.mode === 'auto' ? auto : quality.mode);
          refreshQualityHud();
          console.log('[game_3d] quality tier: ' + quality.tier
            + (quality.mode === 'auto' ? ' (auto)' : ' (forced)')
            + ', probe fps: ' + Math.round(quality.fps));
        }
      }

      // subtle head bob only while moving; never under reduced motion
      if (moved && !reducedMotion) bobPhase += dt * 7.5;
      var bob = (moved && !reducedMotion) ? Math.sin(bobPhase) * 0.035 : 0;
      camera.position.set(player.x, EYE + bob, player.z);
      camera.rotation.order = 'YXZ';
      // player.yaw uses forward = (sin yaw, cos yaw); the camera's default
      // gaze is -Z, so it needs the half-turn offset
      camera.rotation.y = player.yaw + Math.PI;
      camera.rotation.x = player.pitch;
      // the key light travels with the player: tight frustum, crisp shadows
      keyLight.position.set(player.x + 5, 9, player.z + 6);
      keyLight.target.position.set(player.x, 0, player.z - 3);
      POST.update(dt);
      POST.render();
    }

    window.addEventListener('resize', function () {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      POST.resize();
      requestRender(0.5);
    });

    /* =========================== boot =========================== */

    resumeWorld();
    refreshCounter();
    frame();

    buildTitleScreen(function () {
      started = true;
      var frontier = builtRooms[builtRooms.length - 1];
      if (!frontier.decided && !frontier.entered) {
        setHint('Drag to look · WASD or click to move');
        if (frontier.waypoint) frontier.waypoint.visible = true;
        robotSay((activity.intro && activity.intro.headline) || '');
      }
    });

    // Headless-verification hook (no network, no PII: geometry only). Lets an
    // automated harness find clickable objects without guessing pixels.
    window.PracticeGame3D = {
      setQuality: setQualityMode,
      probe: function () {
        var out = { started: started, step: (state.answers[PATH_KEY] || []).length,
          player: { x: player.x, z: player.z },
          quality: { mode: quality.mode, tier: quality.tier, fps: Math.round(quality.fps),
            bloom: POST.enabled(), shadows: renderer.shadowMap.enabled, muralRes: muralRes,
            pixelRatio: Math.round(renderer.getPixelRatio() * 100) / 100 },
          recap: recapRoom ? { entered: recapRoom.entered,
            confetti: !!(recapRoom.confetti && !recapRoom.confetti.done) } : null,
          targets: [] };
        var v = new THREE.Vector3();
        builtRooms.forEach(function (r) {
          r.cards.forEach(function (c) {
            v.setFromMatrixPosition(c.mesh.matrixWorld).project(camera);
            out.targets.push({ kind: 'card', scene: r.scene.id, option: c.option.id,
              x: Math.round((v.x * 0.5 + 0.5) * window.innerWidth),
              y: Math.round((-v.y * 0.5 + 0.5) * window.innerHeight),
              onScreen: v.z < 1 && Math.abs(v.x) < 1 && Math.abs(v.y) < 1,
              decided: r.decided });
          });
          if (r.waypoint.visible) {
            v.setFromMatrixPosition(r.waypoint.matrixWorld).project(camera);
            out.targets.push({ kind: 'waypoint', scene: r.scene.id,
              x: Math.round((v.x * 0.5 + 0.5) * window.innerWidth),
              y: Math.round((-v.y * 0.5 + 0.5) * window.innerHeight),
              onScreen: v.z < 1 && Math.abs(v.x) < 1 && Math.abs(v.y) < 1 });
          }
        });
        return out;
      }
    };
  }

  C.registerFormat('game_3d', renderGame3D);
})();

</script>
</body>
</html>
